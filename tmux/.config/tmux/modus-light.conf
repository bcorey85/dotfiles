# modus-operandi (light) — Protesilaos Stavrou high-contrast light palette.
# Sourced by ~/.tmux.conf based on ~/.cache/theme-mode. Toggle with prefix T.
#
# Mirrors modus-light.conf's structure exactly, with operandi values: base
# #ffffff, dim #f2f2f2, fg #000000, muted #595959, border #9f9f9f. Accents are
# operandi's darker tones (blue #0031a9, red #a60000, magenta #721045, yellow
# #6f5500) with white chip text so they read on a light background.
set -g window-style "fg=#000000,bg=#ffffff"
set -g status-style "bg=#f2f2f2,fg=#000000"
set -g status-left "#[bg=#0031a9,fg=#ffffff,bold] #S #[bg=#f2f2f2] "
set -g status-right "#{?client_prefix,#[bg=#a60000#,fg=#ffffff#,bold] PREFIX #[default] ,}#[fg=#595959]%H:%M #[bg=#721045,fg=#ffffff,bold] #h "
setw -g window-status-format "#[fg=#595959] #I:#W "
setw -g window-status-current-format "#[fg=#0031a9,bold] #I:#W#{?window_zoomed_flag, #[fg=#6f5500]Z#[fg=#0031a9],} "
set -g pane-border-style "fg=#9f9f9f"
set -g pane-active-border-style "fg=#0031a9"
set -g message-style "bg=#f2f2f2,fg=#000000"
set -g mode-style "bg=#0031a9,fg=#ffffff"
