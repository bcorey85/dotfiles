# ef light — ef-reverie (oonamo/ef-themes.nvim port of prot's ef-themes).
# Sourced by the switcher (theme-mode use ef light).
# bg #f3eddf, status #d1b0df (reverie's lilac modeline), fg #4f204f,
# accent #7755b4 (violet), cyan #0b6e8a, green #007a0a, red #ba2d2f.
set -g window-style "fg=#4f204f,bg=#f3eddf"
set -g status-style "bg=#d1b0df,fg=#523044"
set -g status-left "#[bg=#7755b4,fg=#f3eddf,bold] #S #[bg=#d1b0df] "
set -g status-right "#{?client_prefix,#[bg=#ba2d2f#,fg=#f3eddf#,bold] PREFIX #[default] ,}#[fg=#684d68]%H:%M #[bg=#0b6e8a,fg=#f3eddf,bold] #h "
setw -g window-status-format "#[fg=#684d68] #I:#W #{?@workmux_status, #{@workmux_status},}"
setw -g window-status-current-format "#[fg=#3f1440,bold] #I:#W#{?window_zoomed_flag, #[fg=#007a0a]Z#[fg=#3f1440],} #{?@workmux_status, #{@workmux_status},}"
set -g pane-border-style "fg=#c5afb6"
set -g pane-active-border-style "fg=#7755b4"
set -g message-style "bg=#d1b0df,fg=#523044"
set -g mode-style "bg=#e0d0ba,fg=#4f204f"
