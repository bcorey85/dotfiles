# oxocarbon (light) — IBM Carbon light palette (nyoom-engineering/oxocarbon.nvim).
# Sourced by ~/.tmux.conf based on ~/.cache/theme-mode. Toggle with prefix t.
#
# Mirrors oxocarbon-dark.conf's structure exactly, with light values: base
# #ffffff, dim #f3f3f3, border #d5d5d5, text #161616, muted #525252. Accents are
# oxocarbon-light's tones (blue #0f62fe primary, magenta #ee5396, green #42be65,
# purple #673ab7) with white chip text so they read on a light background.
set -g window-style "fg=#161616,bg=#ffffff"
set -g status-style "bg=#f3f3f3,fg=#161616"
set -g status-left "#[bg=#0f62fe,fg=#ffffff,bold] #S #[bg=#f3f3f3] "
set -g status-right "#{?client_prefix,#[bg=#ee5396#,fg=#ffffff#,bold] PREFIX #[default] ,}#[fg=#525252]%H:%M #[bg=#673ab7,fg=#ffffff,bold] #h "
setw -g window-status-format "#[fg=#525252] #I:#W "
setw -g window-status-current-format "#[fg=#0f62fe,bold] #I:#W#{?window_zoomed_flag, #[fg=#42be65]Z#[fg=#0f62fe],} "
set -g pane-border-style "fg=#d5d5d5"
set -g pane-active-border-style "fg=#0f62fe"
set -g message-style "bg=#f3f3f3,fg=#161616"
set -g mode-style "bg=#0f62fe,fg=#ffffff"
