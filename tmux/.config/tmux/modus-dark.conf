# modus dark — modus-vivendi-tinted (miikanissi/modus-themes.nvim port).
# Sourced by the switcher (theme-mode use modus).
# bg #0d0e1c, status #1d2235, fg #ffffff, muted #989898,
# accent #b6a0ff (violet), cyan #00d3d0, green #44bc44, red #ff5f59.
set -g window-style "fg=#ffffff,bg=#0d0e1c"
set -g status-style "bg=#1d2235,fg=#ffffff"
set -g status-left "#[bg=#b6a0ff,fg=#0d0e1c,bold] #S #[bg=#1d2235] "
set -g status-right "#{?client_prefix,#[bg=#ff5f59#,fg=#0d0e1c#,bold] PREFIX #[default] ,}#[fg=#989898]%H:%M #[bg=#00d3d0,fg=#0d0e1c,bold] #h "
setw -g window-status-format "#[fg=#989898] #I:#W #{?@workmux_status, #{@workmux_status},}"
setw -g window-status-current-format "#[fg=#b6a0ff,bold] #I:#W#{?window_zoomed_flag, #[fg=#44bc44]Z#[fg=#b6a0ff],} #{?@workmux_status, #{@workmux_status},}"
set -g pane-border-style "fg=#393f51"
set -g pane-active-border-style "fg=#b6a0ff"
set -g message-style "bg=#1d2235,fg=#ffffff"
set -g mode-style "bg=#7030af,fg=#ffffff"
