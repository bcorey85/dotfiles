# kanso light — webhooked/kanso.nvim "pearl" variant.
# Sourced by the switcher (theme-use kanso light).
# bg #f2f1ef, status #e2e1df, fg #22262d, muted #6d6d69,
# blue #4d699b, teal #5e857a, green #6f894e, red #c84053.
set -g window-style "fg=#22262d,bg=#f2f1ef"
set -g status-style "bg=#e2e1df,fg=#22262d"
set -g status-left "#[bg=#4d699b,fg=#f2f1ef,bold] #S #[bg=#e2e1df] "
set -g status-right "#{?client_prefix,#[bg=#c84053#,fg=#f2f1ef#,bold] PREFIX #[default] ,}#(~/.local/bin/claude-attention badge)#[fg=#6d6d69]%H:%M #[bg=#5e857a,fg=#f2f1ef,bold] #h "
setw -g window-status-format "#[fg=#6d6d69] #I:#W "
setw -g window-status-current-format "#[fg=#4d699b,bold] #I:#W#{?window_zoomed_flag, #[fg=#6f894e]Z#[fg=#4d699b],} "
set -g pane-border-style "fg=#cacac7"
set -g pane-active-border-style "fg=#4d699b"
set -g message-style "bg=#e2e1df,fg=#22262d"
set -g mode-style "bg=#4d699b,fg=#f2f1ef"
