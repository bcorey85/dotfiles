# zenwritten dark — zenbones-theme/zenbones.nvim (grayscale sibling).
# Sourced by the switcher (theme-use zenwritten).
# bg #191919, status #303030, fg #bbbbbb, muted #8f8f8f,
# blue #6099c0, teal #66a5ad, green #819b69, red #de6e7c.
set -g window-style "fg=#bbbbbb,bg=#191919"
set -g status-style "bg=#303030,fg=#bbbbbb"
set -g status-left "#[bg=#6099c0,fg=#191919,bold] #S #[bg=#303030] "
set -g status-right "#{?client_prefix,#[bg=#de6e7c#,fg=#191919#,bold] PREFIX #[default] ,}#[fg=#8f8f8f]%H:%M #[bg=#66a5ad,fg=#191919,bold] #h "
setw -g window-status-format "#[fg=#8f8f8f] #I:#W "
setw -g window-status-current-format "#[fg=#6099c0,bold] #I:#W#{?window_zoomed_flag, #[fg=#819b69]Z#[fg=#6099c0],} "
set -g pane-border-style "fg=#3d3839"
set -g pane-active-border-style "fg=#6099c0"
set -g message-style "bg=#303030,fg=#bbbbbb"
set -g mode-style "bg=#6099c0,fg=#191919"
