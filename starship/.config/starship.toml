# Rosé Pine Moon palette (OneDark BG)
palette = "rose_pine_moon"

[palettes.rose_pine_moon]
red = "#eb6f92"
orange = "#ea9a97"
yellow = "#f6c177"
green = "#3e8fb0"
blue = "#9ccfd8"
teal = "#9ccfd8"
purple = "#c4a7e7"
fg = "#e0def4"
bg = "#282c34"
grey = "#6e6a86"

format = """
$directory\
$git_branch\
$git_status\
$python\
$nodejs\
$cmd_duration\
$line_break\
$character"""

[directory]
style = "bold teal"
truncation_length = 3
truncate_to_repo = true

[git_branch]
format = " [$branch]($style)"
style = "yellow"

[git_status]
format = "[$all_status$ahead_behind]($style) "
style = "red"
ahead = " ↑${count}"
behind = " ↓${count}"
diverged = " ↑${ahead_count}↓${behind_count}"
modified = " ✗"
staged = " +"
untracked = " ?"
stashed = " ≡"

[python]
format = " [${virtualenv}]($style)"
style = "green"
detect_extensions = []

[nodejs]
format = " [ $version]($style)"
style = "green"

[cmd_duration]
min_time = 2_000
format = " [$duration]($style)"
style = "grey"

[character]
success_symbol = "[❯](bold teal)"
error_symbol = "[❯](bold red)"
