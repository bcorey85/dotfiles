# kanagawa-lotus — rebelot/kanagawa.nvim (values from Ghostty's built-in
# "Kanagawa Lotus" theme so terminal and tmux chrome match exactly).
# Sourced by ~/.tmux.conf based on ~/.cache/theme-mode. Toggle with prefix t.
#
# bg #f2ecbc, float (status) #e5ddb0, fg #545464, grey (muted) #8a8980,
# blue #4d699b, aqua #597b75, green #6f894e, red #c84053. Text on coloured
# segments uses the canvas bg #f2ecbc for contrast.
set -g window-style "fg=#545464,bg=#f2ecbc"
set -g status-style "bg=#e5ddb0,fg=#545464"
set -g status-left "#[bg=#4d699b,fg=#f2ecbc,bold] #S #[bg=#e5ddb0] "
set -g status-right "#{?client_prefix,#[bg=#c84053#,fg=#f2ecbc#,bold] PREFIX #[default] ,}#[fg=#8a8980]%H:%M #[bg=#597b75,fg=#f2ecbc,bold] #h "
setw -g window-status-format "#[fg=#8a8980] #I:#W "
setw -g window-status-current-format "#[fg=#4d699b,bold] #I:#W#{?window_zoomed_flag, #[fg=#6f894e]Z#[fg=#4d699b],} "
set -g pane-border-style "fg=#d5cea3"
set -g pane-active-border-style "fg=#4d699b"
set -g message-style "bg=#e5ddb0,fg=#545464"
set -g mode-style "bg=#4d699b,fg=#f2ecbc"
