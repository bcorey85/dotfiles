# rose-pine dark (moon variant). base #232136, surface #2a273f, overlay #393552,
# text #e0def4, subtle #908caa, foam #9ccfd8, love #eb6f92, pine #3e8fb0,
# iris #c4a7e7.
set -g window-style "fg=#e0def4,bg=#232136"
set -g status-style "bg=#2a273f,fg=#e0def4"
set -g status-left "#[bg=#c4a7e7,fg=#232136,bold] #S #[bg=#2a273f] "
set -g status-right "#{?client_prefix,#[bg=#eb6f92#,fg=#232136#,bold] PREFIX #[default] ,}#[fg=#908caa]%H:%M #[bg=#9ccfd8,fg=#232136,bold] #h "
setw -g window-status-format "#[fg=#908caa] #I:#W "
setw -g window-status-current-format "#[fg=#c4a7e7,bold] #I:#W#{?window_zoomed_flag, #[fg=#3e8fb0]Z#[fg=#c4a7e7],} "
set -g pane-border-style "fg=#393552"
set -g pane-active-border-style "fg=#c4a7e7"
set -g message-style "bg=#2a273f,fg=#e0def4"
set -g mode-style "bg=#c4a7e7,fg=#232136"
