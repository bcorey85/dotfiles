# oxocarbon (dark) — IBM Carbon dark palette (nyoom-engineering/oxocarbon.nvim).
# Sourced by ~/.tmux.conf based on ~/.cache/theme-mode. Toggle with prefix t.
#
# window-style pins truecolor fg/bg explicitly: without it, default text routes
# through the terminal's 256-color palette and ghostty tints the fg yellow
# (kitty is unaffected). fg=#161616 on the accent chips is intentional (dark
# base text on a colored chip) — do not dim those.
#
# base00 #161616 bg, base01 #2a2a2a dim, base03 #5c5c5c muted, base05 #f3f3f3 fg,
# base09 #78a9ff blue (primary accent), base10 #ee5396 magenta, base13 #42be65
# green, base14 #be95ff purple.
set -g window-style "fg=#f3f3f3,bg=#161616"
set -g status-style "bg=#2a2a2a,fg=#f3f3f3"
set -g status-left "#[bg=#78a9ff,fg=#161616,bold] #S #[bg=#2a2a2a] "
set -g status-right "#{?client_prefix,#[bg=#ee5396#,fg=#161616#,bold] PREFIX #[default] ,}#[fg=#5c5c5c]%H:%M #[bg=#be95ff,fg=#161616,bold] #h "
setw -g window-status-format "#[fg=#5c5c5c] #I:#W "
setw -g window-status-current-format "#[fg=#78a9ff,bold] #I:#W#{?window_zoomed_flag, #[fg=#42be65]Z#[fg=#78a9ff],} "
set -g pane-border-style "fg=#2a2a2a"
set -g pane-active-border-style "fg=#78a9ff"
set -g message-style "bg=#2a2a2a,fg=#f3f3f3"
set -g mode-style "bg=#78a9ff,fg=#161616"
