# rose-pine light (dawn variant). base #faf4ed, surface #fffaf3, overlay #f2e9e1,
# text #575279, subtle #797593, iris #907aa9, love #b4637a, pine #286983,
# foam #56949f.
set -g window-style "fg=#575279,bg=#faf4ed"
set -g status-style "bg=#f2e9e1,fg=#575279"
set -g status-left "#[bg=#907aa9,fg=#faf4ed,bold] #S #[bg=#f2e9e1] "
set -g status-right "#{?client_prefix,#[bg=#b4637a#,fg=#faf4ed#,bold] PREFIX #[default] ,}#[fg=#797593]%H:%M #[bg=#56949f,fg=#faf4ed,bold] #h "
setw -g window-status-format "#[fg=#797593] #I:#W #{?@workmux_status, #{@workmux_status},}"
setw -g window-status-current-format "#[fg=#907aa9,bold] #I:#W#{?window_zoomed_flag, #[fg=#286983]Z#[fg=#907aa9],} #{?@workmux_status, #{@workmux_status},}"
set -g pane-border-style "fg=#dfdad9"
set -g pane-active-border-style "fg=#907aa9"
set -g message-style "bg=#f2e9e1,fg=#575279"
set -g mode-style "bg=#907aa9,fg=#faf4ed"
