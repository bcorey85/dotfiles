# tokyonight light — folke/tokyonight.nvim "day" variant.
# bg #e1e2e7, status #d0d5e3, fg #223c7d, muted #565e80,
# blue #2e7de9, cyan #007197, green #587539, red #f52a65.
# fg is the deepened body ink the nvim side also uses (stock #3760bf is 4.52:1).
set -g window-style "fg=#223c7d,bg=#e1e2e7"
set -g status-style "bg=#d0d5e3,fg=#223c7d"
set -g status-left "#[bg=#2e7de9,fg=#e1e2e7,bold] #S #[bg=#d0d5e3] "
set -g status-right "#{?client_prefix,#[bg=#f52a65#,fg=#e1e2e7#,bold] PREFIX #[default] ,}#[fg=#565e80]%H:%M #[bg=#007197,fg=#e1e2e7,bold] #h "
setw -g window-status-format "#[fg=#565e80] #I:#W "
setw -g window-status-current-format "#[fg=#2e7de9,bold] #I:#W#{?window_zoomed_flag, #[fg=#587539]Z#[fg=#2e7de9],} "
set -g pane-border-style "fg=#a8aecb"
set -g pane-active-border-style "fg=#2e7de9"
set -g message-style "bg=#d0d5e3,fg=#223c7d"
set -g mode-style "bg=#b6bfe2,fg=#223c7d"
