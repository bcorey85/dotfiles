# everforest dark (medium) — sainnhe/everforest
# Sourced by the theme-mode switcher (theme-use everforest).
# bg #2d353b, status (bg_dim) #232a2e, fg #d3c6aa, muted (grey1) #859289,
# blue #7fbbb3, green #a7c080, red #e67e80, purple #d699b6. Text on coloured
# segments uses the canvas bg #2d353b for contrast.
set -g window-style "fg=#d3c6aa,bg=#2d353b"
set -g status-style "bg=#232a2e,fg=#d3c6aa"
set -g status-left "#[bg=#7fbbb3,fg=#2d353b,bold] #S #[bg=#232a2e] "
set -g status-right "#{?client_prefix,#[bg=#e67e80#,fg=#2d353b#,bold] PREFIX #[default] ,}#(~/.local/bin/claude-attention badge)#[fg=#859289]%H:%M #[bg=#a7c080,fg=#2d353b,bold] #h "
setw -g window-status-format "#[fg=#859289] #I:#W "
setw -g window-status-current-format "#[fg=#7fbbb3,bold] #I:#W#{?window_zoomed_flag, #[fg=#a7c080]Z#[fg=#7fbbb3],} "
set -g pane-border-style "fg=#475258"
set -g pane-active-border-style "fg=#7fbbb3"
set -g message-style "bg=#232a2e,fg=#d3c6aa"
set -g mode-style "bg=#7fbbb3,fg=#2d353b"
