# github_dark_dimmed — projekt0n/github-nvim-theme
# Sourced by ~/.tmux.conf based on ~/.cache/theme-mode. Toggle with prefix T
# (theme-mode).
#
# bg #22272e, float (status) #1c2128, fg #adbac7, grey (muted) #768390,
# blue #539bf5, cyan #76e3ea, green #57ab5a, red #f47067. Text on coloured
# segments uses the canvas bg #22272e for contrast.
set -g window-style "fg=#adbac7,bg=#22272e"
set -g status-style "bg=#1c2128,fg=#adbac7"
set -g status-left "#[bg=#539bf5,fg=#22272e,bold] #S #[bg=#1c2128] "
set -g status-right "#{?client_prefix,#[bg=#f47067#,fg=#22272e#,bold] PREFIX #[default] ,}#(~/.local/bin/claude-attention badge)#[fg=#768390]%H:%M #[bg=#76e3ea,fg=#22272e,bold] #h "
setw -g window-status-format "#[fg=#768390] #I:#W "
setw -g window-status-current-format "#[fg=#539bf5,bold] #I:#W#{?window_zoomed_flag, #[fg=#57ab5a]Z#[fg=#539bf5],} "
set -g pane-border-style "fg=#444c56"
set -g pane-active-border-style "fg=#539bf5"
set -g message-style "bg=#1c2128,fg=#adbac7"
set -g mode-style "bg=#539bf5,fg=#22272e"
