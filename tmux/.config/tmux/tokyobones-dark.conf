# tokyobones dark — zenbones-theme/zenbones.nvim (tokyonight-flavored bones),
# values from the theme's night palette. Sourced by the switcher (theme-mode
# use tokyobones).
# bg #1a1b26, status #24283b (storm), fg #c0caf5, muted #737aa2,
# blue #7aa2f7, teal #73daca, wood #e0af68, red #f7768e, magenta #bb9af7.
set -g window-style "fg=#c0caf5,bg=#1a1b26"
set -g status-style "bg=#24283b,fg=#c0caf5"
set -g status-left "#[bg=#7aa2f7,fg=#1a1b26,bold] #S #[bg=#24283b] "
set -g status-right "#{?client_prefix,#[bg=#f7768e#,fg=#1a1b26#,bold] PREFIX #[default] ,}#[fg=#737aa2]%H:%M #[bg=#73daca,fg=#1a1b26,bold] #h "
setw -g window-status-format "#[fg=#737aa2] #I:#W #{?@workmux_status, #{@workmux_status},}"
setw -g window-status-current-format "#[fg=#7aa2f7,bold] #I:#W#{?window_zoomed_flag, #[fg=#e0af68]Z#[fg=#7aa2f7],} #{?@workmux_status, #{@workmux_status},}"
set -g pane-border-style "fg=#414868"
set -g pane-active-border-style "fg=#7aa2f7"
set -g message-style "bg=#24283b,fg=#c0caf5"
set -g mode-style "bg=#7aa2f7,fg=#1a1b26"
