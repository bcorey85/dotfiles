# kanagawa-paper dark — thesimonho/kanagawa-paper.nvim "ink" variant (dusty indigo night).
# Sourced by the switcher (theme-mode use kanagawa-paper).
# bg #1f1f28, status #2a2a37, fg #dcd7ba, muted #727169,
# blue #859fac, aqua #96ada7, green #90a17e, red #c4746e.
set -g window-style "fg=#dcd7ba,bg=#1f1f28"
set -g status-style "bg=#2a2a37,fg=#dcd7ba"
set -g status-left "#[bg=#859fac,fg=#1f1f28,bold] #S #[bg=#2a2a37] "
set -g status-right "#{?client_prefix,#[bg=#c4746e#,fg=#1f1f28#,bold] PREFIX #[default] ,}#[fg=#727169]%H:%M #[bg=#96ada7,fg=#1f1f28,bold] #h "
setw -g window-status-format "#[fg=#727169] #I:#W #{?@workmux_status, #{@workmux_status},}"
setw -g window-status-current-format "#[fg=#859fac,bold] #I:#W#{?window_zoomed_flag, #[fg=#90a17e]Z#[fg=#859fac],} #{?@workmux_status, #{@workmux_status},}"
set -g pane-border-style "fg=#363646"
set -g pane-active-border-style "fg=#859fac"
set -g message-style "bg=#2a2a37,fg=#dcd7ba"
set -g mode-style "bg=#363646,fg=#dcd7ba"
