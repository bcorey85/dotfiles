# solarized light — Schoonover's canonical palette (maxmx03/solarized.nvim).
# Sourced by the switcher (theme-mode use solarized light).
# bg base3 #fdf6e3, status base2 #eee8d5, fg deepened #0f4451 (stock base00 is
# 4.1:1 — under floor), muted base01 #586e75, blue #268bd2, cyan #2aa198,
# green #859900, red #dc322f.
set -g window-style "fg=#0f4451,bg=#fdf6e3"
set -g status-style "bg=#eee8d5,fg=#0f4451"
set -g status-left "#[bg=#268bd2,fg=#fdf6e3,bold] #S #[bg=#eee8d5] "
set -g status-right "#{?client_prefix,#[bg=#dc322f#,fg=#fdf6e3#,bold] PREFIX #[default] ,}#[fg=#586e75]%H:%M #[bg=#2aa198,fg=#fdf6e3,bold] #h "
setw -g window-status-format "#[fg=#586e75] #I:#W "
setw -g window-status-current-format "#[fg=#268bd2,bold] #I:#W#{?window_zoomed_flag, #[fg=#859900]Z#[fg=#268bd2],} "
set -g pane-border-style "fg=#93a1a1"
set -g pane-active-border-style "fg=#268bd2"
set -g message-style "bg=#eee8d5,fg=#0f4451"
set -g mode-style "bg=#268bd2,fg=#fdf6e3"
