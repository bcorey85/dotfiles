# gruvbox-material light (medium) — sainnhe/gruvbox-material
# Sourced by the theme-mode switcher (theme-use gruvbox-material light).
# bg #fbf1c7, status (bg_dim) #f2e5bc, fg #654735, muted #928374,
# blue #45707a, aqua #4c7a5d, green #6c782e, red #c14a4a. Text on coloured
# segments uses the canvas bg #fbf1c7 for contrast.
set -g window-style "fg=#654735,bg=#fbf1c7"
set -g status-style "bg=#f2e5bc,fg=#654735"
set -g status-left "#[bg=#45707a,fg=#fbf1c7,bold] #S #[bg=#f2e5bc] "
set -g status-right "#{?client_prefix,#[bg=#c14a4a#,fg=#fbf1c7#,bold] PREFIX #[default] ,}#(~/.local/bin/claude-attention badge)#[fg=#928374]%H:%M #[bg=#4c7a5d,fg=#fbf1c7,bold] #h "
setw -g window-status-format "#[fg=#928374] #I:#W "
setw -g window-status-current-format "#[fg=#45707a,bold] #I:#W#{?window_zoomed_flag, #[fg=#6c782e]Z#[fg=#45707a],} "
set -g pane-border-style "fg=#d5c4a1"
set -g pane-active-border-style "fg=#45707a"
set -g message-style "bg=#f2e5bc,fg=#654735"
set -g mode-style "bg=#45707a,fg=#fbf1c7"
