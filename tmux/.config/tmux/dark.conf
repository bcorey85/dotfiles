# terafox (dark) — EdenEast/nightfox.nvim
# Sourced by ~/.tmux.conf based on ~/.cache/theme-mode. Toggle with prefix t.
#
# bg #152528, float (status/float) #1d3337, fg #e6eaea, grey (muted) #6d7f8b,
# blue #5a93aa, cyan #a1cdd8, green #7aa4a1, red #e85c51.
set -g window-style "fg=#e6eaea,bg=#152528"
set -g status-style "bg=#1d3337,fg=#e6eaea"
set -g status-left "#[bg=#5a93aa,fg=#0f1c1e,bold] #S #[bg=#1d3337] "
set -g status-right "#{?client_prefix,#[bg=#e85c51#,fg=#0f1c1e#,bold] PREFIX #[default] ,}#[fg=#6d7f8b]%H:%M #[bg=#a1cdd8,fg=#0f1c1e,bold] #h "
setw -g window-status-format "#[fg=#6d7f8b] #I:#W "
setw -g window-status-current-format "#[fg=#5a93aa,bold] #I:#W#{?window_zoomed_flag, #[fg=#7aa4a1]Z#[fg=#5a93aa],} "
set -g pane-border-style "fg=#1d3337"
set -g pane-active-border-style "fg=#5a93aa"
set -g message-style "bg=#1d3337,fg=#e6eaea"
set -g mode-style "bg=#5a93aa,fg=#0f1c1e"
