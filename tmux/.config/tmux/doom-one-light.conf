# doom-one light — NTBBloodbath/doom-one.nvim (doom emacs doom-one-light palette)
# Sourced by ~/.tmux.conf based on ~/.cache/theme-mode. Toggle with prefix T
# (theme-mode).
#
# bg #fafafa, float (status) #f0f0f0, fg #383a42, grey (muted) #9ca0a4,
# blue #4078f2, cyan #0184bc, green #50a14f, red #e45649. Text on coloured
# segments uses the canvas bg #fafafa for contrast.
set -g window-style "fg=#383a42,bg=#fafafa"
set -g status-style "bg=#f0f0f0,fg=#383a42"
set -g status-left "#[bg=#4078f2,fg=#fafafa,bold] #S #[bg=#f0f0f0] "
set -g status-right "#{?client_prefix,#[bg=#e45649#,fg=#fafafa#,bold] PREFIX #[default] ,}#(~/.local/bin/claude-attention badge)#[fg=#9ca0a4]%H:%M #[bg=#0184bc,fg=#fafafa,bold] #h "
setw -g window-status-format "#[fg=#9ca0a4] #I:#W "
setw -g window-status-current-format "#[fg=#4078f2,bold] #I:#W#{?window_zoomed_flag, #[fg=#50a14f]Z#[fg=#4078f2],} "
set -g pane-border-style "fg=#dfdfdf"
set -g pane-active-border-style "fg=#4078f2"
set -g message-style "bg=#f0f0f0,fg=#383a42"
set -g mode-style "bg=#4078f2,fg=#fafafa"
