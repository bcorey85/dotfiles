# Intel BE200 (Wi-Fi 7) stability fix.
# The 802.11be / 320 MHz path on iwlwifi+iwlmld causes DISASSOC_LOW_ACK
# drops and reconnect loops every ~20-30s. Disabling 11be drops the link
# back to Wi-Fi 6 (AX), which is stable and still fast.
options iwlwifi disable_11be=1
# Fallback knobs if drops persist (uncomment one at a time, then reboot):
#options iwlwifi disable_11be=1 bt_coex_active=0
#options iwlwifi disable_11be=1 disable_11ax=1
