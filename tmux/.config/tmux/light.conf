# dayfox (light) — EdenEast/nightfox.nvim
# Sourced by ~/.tmux.conf based on ~/.cache/theme-mode. Toggle with prefix t.
#
# bg #f6f2ee, float (status/float) #e4dcd4, fg #3d2b5a, grey (muted) #824d5b,
# blue #2848a9, cyan #287980, green #396847, red #a5222f.
set -g window-style "fg=#3d2b5a,bg=#f6f2ee"
set -g status-style "bg=#e4dcd4,fg=#3d2b5a"
set -g status-left "#[bg=#2848a9,fg=#e4dcd4,bold] #S #[bg=#e4dcd4] "
set -g status-right "#{?client_prefix,#[bg=#a5222f#,fg=#e4dcd4#,bold] PREFIX #[default] ,}#[fg=#824d5b]%H:%M #[bg=#287980,fg=#e4dcd4,bold] #h "
setw -g window-status-format "#[fg=#824d5b] #I:#W "
setw -g window-status-current-format "#[fg=#2848a9,bold] #I:#W#{?window_zoomed_flag, #[fg=#396847]Z#[fg=#2848a9],} "
set -g pane-border-style "fg=#e4dcd4"
set -g pane-active-border-style "fg=#2848a9"
set -g message-style "bg=#e4dcd4,fg=#3d2b5a"
set -g mode-style "bg=#2848a9,fg=#e4dcd4"
