# kanso-pearl — webhooked/kanso.nvim (values from Ghostty's built-in
# "Kanso Pearl" theme so terminal and tmux chrome match exactly).
# Sourced by ~/.tmux.conf based on ~/.cache/theme-mode. Toggle with prefix t.
#
# bg #f2f1ef, float (status) #e2e1df, fg #22262d, grey (muted) #6d6f6e,
# blue #4d699b, aqua #597b75, green #6f894e, red #c84053. Text on coloured
# segments uses the canvas bg #f2f1ef for contrast.
set -g window-style "fg=#22262d,bg=#f2f1ef"
set -g status-style "bg=#e2e1df,fg=#22262d"
set -g status-left "#[bg=#4d699b,fg=#f2f1ef,bold] #S #[bg=#e2e1df] "
set -g status-right "#{?client_prefix,#[bg=#c84053#,fg=#f2f1ef#,bold] PREFIX #[default] ,}#[fg=#6d6f6e]%H:%M #[bg=#597b75,fg=#f2f1ef,bold] #h "
setw -g window-status-format "#[fg=#6d6f6e] #I:#W "
setw -g window-status-current-format "#[fg=#4d699b,bold] #I:#W#{?window_zoomed_flag, #[fg=#6f894e]Z#[fg=#4d699b],} "
set -g pane-border-style "fg=#d2d1cf"
set -g pane-active-border-style "fg=#4d699b"
set -g message-style "bg=#e2e1df,fg=#22262d"
set -g mode-style "bg=#4d699b,fg=#f2f1ef"
