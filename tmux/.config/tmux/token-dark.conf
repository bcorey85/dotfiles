# token dark — ThorstenRhau/token, warm zero-config palette.
# Sourced by the switcher (theme-mode use token).
# bg #262624, status #1d1d1c, fg #e8e4dc, muted #938e87,
# accent #d97757, cyan #6ba8a8, green #7da47a, red #c67777.
set -g window-style "fg=#e8e4dc,bg=#262624"
set -g status-style "bg=#1d1d1c,fg=#e8e4dc"
set -g status-left "#[bg=#d97757,fg=#262624,bold] #S #[bg=#1d1d1c] "
set -g status-right "#{?client_prefix,#[bg=#c67777#,fg=#262624#,bold] PREFIX #[default] ,}#[fg=#938e87]%H:%M #[bg=#6ba8a8,fg=#262624,bold] #h "
setw -g window-status-format "#[fg=#938e87] #I:#W "
setw -g window-status-current-format "#[fg=#d97757,bold] #I:#W#{?window_zoomed_flag, #[fg=#7da47a]Z#[fg=#d97757],} "
set -g pane-border-style "fg=#383835"
set -g pane-active-border-style "fg=#d97757"
set -g message-style "bg=#1d1d1c,fg=#e8e4dc"
set -g mode-style "bg=#3a3a37,fg=#e8e4dc"
