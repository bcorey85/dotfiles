unbind C-b
set -g prefix C-Space
bind C-Space send-prefix
unbind Space

set -g base-index 1
setw -g pane-base-index 1
set -g mouse on
set -g history-limit 10000

# Vi-style copy mode + system clipboard (OSC52, cross-platform: mac/Linux/WSL)
setw -g mode-keys vi
set -g set-clipboard on
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y send -X copy-selection-and-cancel

bind '\' split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

bind -r k select-pane -U
bind -r j select-pane -D
bind -r h select-pane -L
bind -r l select-pane -R

# Move window left/right
bind < swap-window -t -1\; select-window -t -1
bind > swap-window -t +1\; select-window -t +1

# Auto-equalize layouts
bind = select-layout even-horizontal
bind _ select-layout tiled

# Window switching by number (no prefix). Copy-mode via default `prefix [`.
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4

# smart-splits.nvim: cross-boundary nav (C-hjkl) + resize (A-hjkl).
# `@pane-is-vim` is set by the nvim plugin on startup; when true, forward the
# keystroke to nvim, else handle in tmux.
bind-key -n C-h if -F "#{@pane-is-vim}" 'send-keys C-h' 'select-pane -L'
bind-key -n C-j if -F "#{@pane-is-vim}" 'send-keys C-j' 'select-pane -D'
bind-key -n C-k if -F "#{@pane-is-vim}" 'send-keys C-k' 'select-pane -U'
bind-key -n C-l if -F "#{@pane-is-vim}" 'send-keys C-l' 'select-pane -R'
bind-key -n M-h if -F "#{@pane-is-vim}" 'send-keys M-h' 'resize-pane -L 3'
bind-key -n M-j if -F "#{@pane-is-vim}" 'send-keys M-j' 'resize-pane -D 3'
bind-key -n M-k if -F "#{@pane-is-vim}" 'send-keys M-k' 'resize-pane -U 3'
bind-key -n M-l if -F "#{@pane-is-vim}" 'send-keys M-l' 'resize-pane -R 3'

set-option -sg escape-time 10

# Fix colors and enable true color support
set -g default-terminal "tmux-256color"
set -gs terminal-overrides ",*:RGB"
set -s set-clipboard on

# Enable undercurl and colored underlines (for Neovim diagnostics)
set -ga terminal-features ",*:usstyle"

# Enable focus events for autoread
set -g focus-events on

# TPM plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'mrjones2014/smart-splits.nvim'

# Catppuccin Mocha theme (Maia BG)
# Pin base pane fg/bg to explicit truecolor. Without this, default text routes
# through the terminal's 256-color palette — ghostty's regenerated palette
# renders the default fg with a yellow tint (kitty is unaffected). Explicit RGB
# renders identically across kitty/ghostty/alacritty.
set -g window-style "fg=#cdd6f4,bg=#282c34"
set -g status-style "bg=#323844,fg=#cdd6f4"
set -g status-left "#[bg=#94e2d5,fg=#282c34,bold] #S #[bg=#323844] "
set -g status-right "#[fg=#6c7086]%H:%M #[bg=#b4befe,fg=#282c34,bold] #h "
set -g status-left-length 30
set -g status-right-length 40
setw -g window-status-format "#[fg=#6c7086] #I:#W "
setw -g window-status-current-format "#[fg=#94e2d5,bold] #I:#W "
set -g pane-border-style "fg=#3b4252"
set -g pane-active-border-style "fg=#94e2d5"
set -g message-style "bg=#3b4252,fg=#cdd6f4"
set -g mode-style "bg=#3b4252,fg=#cdd6f4"

# Sessionizer
bind f display-popup -E -w 60% -h 60% "~/.local/bin/tmux-sessionizer"

# Neogit popup
bind g display-popup -d "#{pane_current_path}" -w 100% -h 100% -E 'NEOGIT_POPUP=1 nvim -c Neogit'

# Diffview popup - throwaway nvim opening :DiffviewOpen on the current repo, for
# side-by-side review without leaving the Claude pane (sibling to the lazygit
# popup above). DIFFVIEW_POPUP disables the Snacks dashboard (see plugins/snacks.lua)
# so the startup tab stays an empty [No Name], and flips diffview.lua into popup
# mode (its view_closed hook runs `qa` so q dismisses the popup like lazygit).
# :DiffviewOpen opens its view in a NEW tab asynchronously, so a synchronous
# tabclose races it. Instead we arm a one-shot autocmd on DiffviewViewOpened
# (fires once the diff view's tab is current) that runs `tabonly` to drop the
# leftover empty [No Name] tab. Overrides the default `prefix d` detach-client
# (detach via `tmux detach`).
bind d display-popup -d "#{pane_current_path}" -w 100% -h 100% -E 'DIFFVIEW_POPUP=1 nvim -c "autocmd User DiffviewViewOpened ++once lua vim.schedule(function() pcall(vim.cmd, [[silent! tabonly]]) end)" -c DiffviewOpen'

# Revdiff popup (review all uncommitted changes vs HEAD - staged + unstaged +
# untracked/new files; annotations saved per-repo in .git/ for the agent to act on)
bind r display-popup -d "#{pane_current_path}" -w 100% -h 100% -E 'revdiff HEAD --untracked -o "$(git rev-parse --absolute-git-dir)/revdiff-review.md"'

# System monitor popup
bind b display-popup -d "#{pane_current_path}" -w 95% -h 95% -E "btop"

# Project search popup (rg + fzf, opens result in nvim)
unbind /
bind / display-popup -d "#{pane_current_path}" -w 95% -h 95% -E \
  "rg --color=always --line-number --no-heading '' | fzf --ansi --delimiter=: --preview 'bat --color=always --highlight-line {2} {1}' --preview-window='up,60%' --bind 'enter:become(nvim +{2} {1})'"

# Obsidian vault search popup (enter=read in glow, ctrl-e=edit in nvim)
bind v display-popup -w 95% -h 95% -E \
  "fd -e md . ~/vault | fzf --header 'enter=read | ctrl-e=edit' --preview 'glow -s dark {}' --preview-window='right,60%' --bind 'enter:become(glow -p {})' --bind 'ctrl-e:become(nvim {})'"

# Paste clipboard image to ~/Pictures/clipboard/ and type its path into the active pane
bind -N "Paste clipboard image to file + path into pane" C-v run-shell -b "$HOME/.local/bin/clip-image"

# Initialize TPM (keep at bottom)
run '~/.tmux/plugins/tpm/tpm'
