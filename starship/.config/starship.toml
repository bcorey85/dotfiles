# Theme — owned by the `theme-mode` switcher. Starship has no include mechanism,
# but it re-reads its whole config every prompt, so theme-mode regenerates
# ~/.cache/starship.toml from THIS file with the `palette =` line below swapped
# to the active mode (dark|light), and .zshrc points STARSHIP_CONFIG at that
# cache. The next prompt picks up the flip live — same source-of-truth model as
# ghostty/tmux, a machine-local file instead of dirtying this tracked one.
#
# THIS file is the template: if you edit it, re-run `theme-mode` (any invocation)
# to regenerate the cache, or the change won't show until the next theme switch.
#
# NOTE: the root `palette`/`format` keys MUST come before any [palettes.*] table
# header — any key after a table header belongs to that table. Placed below a
# palette, `format` silently became palettes.<name>.format and starship fell
# back to the default `$all` format (which pulls in $aws et al.).
palette = "dark"

format = """
$directory\
$git_branch\
$git_status\
$python\
$nodejs\
$cmd_duration\
$line_break\
$character"""

# Dark — GitHub Dark Dimmed.
[palettes.dark]
red = "#f47067"
orange = "#c69026"
yellow = "#c69026"
green = "#57ab5a"
blue = "#539bf5"
teal = "#76e3ea"
purple = "#b083f0"
fg = "#adbac7"
bg = "#22272e"
grey = "#768390"

# Light — GitHub Primer light (accessible contrast on a light terminal bg).
[palettes.light]
red = "#cf222e"
orange = "#bc4c00"
yellow = "#9a6700"
green = "#1a7f37"
blue = "#0969da"
teal = "#1b7c83"
purple = "#8250df"
fg = "#24292f"
bg = "#ffffff"
grey = "#6e7781"

[directory]
style = "bold teal"
truncation_length = 3
truncate_to_repo = true

[git_branch]
format = " [$branch]($style)"
style = "blue"

[git_status]
format = "[$all_status$ahead_behind]($style) "
style = "red"
ahead = " ↑${count}"
behind = " ↓${count}"
diverged = " ↑${ahead_count}↓${behind_count}"
modified = " ✗"
staged = " +"
untracked = " ?"
stashed = " ≡"

[python]
format = " [${virtualenv}]($style)"
style = "green"
detect_extensions = []

[nodejs]
format = " [ $version]($style)"
style = "green"

[cmd_duration]
min_time = 2_000
format = " [$duration]($style)"
style = "grey"

[character]
success_symbol = "[❯](bold teal)"
error_symbol = "[❯](bold red)"
