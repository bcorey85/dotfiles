# one dark — onedark (olimorris/onedarkpro.nvim), Atom's One Dark.
# bg #282c34, status #21252b, fg #abb2bf, accent #61afef (blue),
# green #98c379, red #e06c75, purple #c678dd.
set -g window-style "fg=#abb2bf,bg=#282c34"
set -g status-style "bg=#21252b,fg=#abb2bf"
set -g status-left "#[bg=#61afef,fg=#282c34,bold] #S #[bg=#21252b] "
set -g status-right "#{?client_prefix,#[bg=#e06c75#,fg=#282c34#,bold] PREFIX #[default] ,}#[fg=#7f848e]%H:%M #[bg=#98c379,fg=#282c34,bold] #h "
setw -g window-status-format "#[fg=#7f848e] #I:#W #{?@workmux_status, #{@workmux_status},}"
setw -g window-status-current-format "#[fg=#61afef,bold] #I:#W#{?window_zoomed_flag, #[fg=#98c379]Z#[fg=#61afef],} #{?@workmux_status, #{@workmux_status},}"
set -g pane-border-style "fg=#3e4451"
set -g pane-active-border-style "fg=#61afef"
set -g message-style "bg=#21252b,fg=#abb2bf"
set -g mode-style "bg=#414858,fg=#abb2bf"
