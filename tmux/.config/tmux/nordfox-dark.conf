# nordfox dark — nightfox.nvim's nordfox variant (the Nord palette).
# Sourced by ~/.tmux.conf based on ~/.cache/theme-mode. Toggle with prefix T
# (theme-mode).
#
# bg #2e3440 (nord0), float (status) #3b4252, fg #cdcecf, grey (muted) #7c8aa5,
# frost blue #81a1c1, frost cyan #88c0d0, aurora green #a3be8c, red #bf616a.
# Text on coloured segments uses the canvas bg #2e3440 for contrast.
set -g window-style "fg=#cdcecf,bg=#2e3440"
set -g status-style "bg=#3b4252,fg=#cdcecf"
set -g status-left "#[bg=#81a1c1,fg=#2e3440,bold] #S #[bg=#3b4252] "
set -g status-right "#{?client_prefix,#[bg=#bf616a#,fg=#2e3440#,bold] PREFIX #[default] ,}#[fg=#7c8aa5]%H:%M #[bg=#88c0d0,fg=#2e3440,bold] #h "
setw -g window-status-format "#[fg=#7c8aa5] #I:#W #{?@workmux_status, #{@workmux_status},}"
setw -g window-status-current-format "#[fg=#81a1c1,bold] #I:#W#{?window_zoomed_flag, #[fg=#a3be8c]Z#[fg=#81a1c1],} #{?@workmux_status, #{@workmux_status},}"
set -g pane-border-style "fg=#434c5e"
set -g pane-active-border-style "fg=#81a1c1"
set -g message-style "bg=#3b4252,fg=#cdcecf"
set -g mode-style "bg=#81a1c1,fg=#2e3440"
