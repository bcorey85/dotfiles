# modus-vivendi (dark) — oxocarbon-tinted background + dimmed foreground.
# Sourced by ~/.tmux.conf based on ~/.cache/theme-mode. Toggle with prefix T.
#
# window-style pins truecolor fg/bg explicitly: without it, default text routes
# through the terminal's 256-color palette and ghostty tints the fg yellow
# (kitty is unaffected). fg=#000000 on the accent chips is intentional (black
# text on a colored chip) — do not dim those.
#
# bg greys map onto oxocarbon: base #161616, elevated #262626. fg #d0d0d0 is
# oxocarbon base04 (dimmed off-white). Accents are modus-vivendi.
set -g window-style "fg=#d0d0d0,bg=#161616"
set -g status-style "bg=#262626,fg=#d0d0d0"
set -g status-left "#[bg=#2fafff,fg=#000000,bold] #S #[bg=#262626] "
set -g status-right "#{?client_prefix,#[bg=#ff5f59#,fg=#000000#,bold] PREFIX #[default] ,}#[fg=#535353]%H:%M #[bg=#feacd0,fg=#000000,bold] #h "
setw -g window-status-format "#[fg=#535353] #I:#W "
setw -g window-status-current-format "#[fg=#2fafff,bold] #I:#W#{?window_zoomed_flag, #[fg=#fec43f]Z#[fg=#2fafff],} "
set -g pane-border-style "fg=#262626"
set -g pane-active-border-style "fg=#2fafff"
set -g message-style "bg=#262626,fg=#d0d0d0"
set -g mode-style "bg=#2fafff,fg=#d0d0d0"
