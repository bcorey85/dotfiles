# carbonfox dark — nightfox.nvim's carbonfox variant (IBM Carbon; near-black neutral).
# Sourced by ~/.tmux.conf based on ~/.cache/theme-mode. Toggle with prefix T
# (theme-mode).
#
# bg #161616, float (status) #262626, fg #f2f4f8, grey (muted) #8d8d8d,
# blue #78a9ff, cyan #33b1ff, green #25be6a, red #ee5396. Text on coloured
# segments uses the canvas bg #161616 for contrast.
set -g window-style "fg=#f2f4f8,bg=#161616"
set -g status-style "bg=#262626,fg=#f2f4f8"
set -g status-left "#[bg=#78a9ff,fg=#161616,bold] #S #[bg=#262626] "
set -g status-right "#{?client_prefix,#[bg=#ee5396#,fg=#161616#,bold] PREFIX #[default] ,}#[fg=#8d8d8d]%H:%M #[bg=#33b1ff,fg=#161616,bold] #h "
setw -g window-status-format "#[fg=#8d8d8d] #I:#W #{?@workmux_status, #{@workmux_status},}"
setw -g window-status-current-format "#[fg=#78a9ff,bold] #I:#W#{?window_zoomed_flag, #[fg=#25be6a]Z#[fg=#78a9ff],} #{?@workmux_status, #{@workmux_status},}"
set -g pane-border-style "fg=#393939"
set -g pane-active-border-style "fg=#78a9ff"
set -g message-style "bg=#262626,fg=#f2f4f8"
set -g mode-style "bg=#78a9ff,fg=#161616"
