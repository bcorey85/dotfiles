# kanagawa-paper light — thesimonho/kanagawa-paper.nvim "canvas" variant (warm paper).
# Sourced by the switcher (theme-mode use kanagawa-paper light).
# bg #e1e1de, status #d4d0cc, fg #4a4e53 (theme body #73787d deepened for
# contrast), muted #63625b, blue #3f5f83, teal #4f665f, green #5f6f4a, red #954f4b.
set -g window-style "fg=#4a4e53,bg=#e1e1de"
set -g status-style "bg=#d4d0cc,fg=#4a4e53"
set -g status-left "#[bg=#3f5f83,fg=#e1e1de,bold] #S #[bg=#d4d0cc] "
set -g status-right "#{?client_prefix,#[bg=#954f4b#,fg=#e1e1de#,bold] PREFIX #[default] ,}#[fg=#63625b]%H:%M #[bg=#4f665f,fg=#e1e1de,bold] #h "
setw -g window-status-format "#[fg=#63625b] #I:#W #{?@workmux_status, #{@workmux_status},}"
setw -g window-status-current-format "#[fg=#3f5f83,bold] #I:#W#{?window_zoomed_flag, #[fg=#5f6f4a]Z#[fg=#3f5f83],} #{?@workmux_status, #{@workmux_status},}"
set -g pane-border-style "fg=#cdcdc9"
set -g pane-active-border-style "fg=#3f5f83"
set -g message-style "bg=#d4d0cc,fg=#4a4e53"
set -g mode-style "bg=#d4cdd4,fg=#4a4e53"
