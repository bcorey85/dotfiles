# rose-pine dark (main variant). base #191724, surface #1f1d2e, overlay #26233a,
# text #e0def4, subtle #908caa, foam #9ccfd8, love #eb6f92, pine #31748f,
# iris #c4a7e7.
set -g window-style "fg=#e0def4,bg=#191724"
set -g status-style "bg=#1f1d2e,fg=#e0def4"
set -g status-left "#[bg=#c4a7e7,fg=#191724,bold] #S #[bg=#1f1d2e] "
set -g status-right "#{?client_prefix,#[bg=#eb6f92#,fg=#191724#,bold] PREFIX #[default] ,}#[fg=#908caa]%H:%M #[bg=#9ccfd8,fg=#191724,bold] #h "
setw -g window-status-format "#[fg=#908caa] #I:#W "
setw -g window-status-current-format "#[fg=#c4a7e7,bold] #I:#W#{?window_zoomed_flag, #[fg=#31748f]Z#[fg=#c4a7e7],} "
set -g pane-border-style "fg=#26233a"
set -g pane-active-border-style "fg=#c4a7e7"
set -g message-style "bg=#1f1d2e,fg=#e0def4"
set -g mode-style "bg=#c4a7e7,fg=#191724"
