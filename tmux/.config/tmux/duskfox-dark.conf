# duskfox dark — nightfox.nvim's duskfox variant (rose-pine-moon derivative).
# Sourced by ~/.tmux.conf based on ~/.cache/theme-mode. Toggle with prefix T
# (theme-mode).
#
# bg #232136, float (status) #191726, fg #e0def4, grey (muted) #817c9c,
# blue #65b1cd, cyan #9ccfd8, green #a3be8c, red #eb6f92. Text on coloured
# segments uses the canvas bg #232136 for contrast.
set -g window-style "fg=#e0def4,bg=#232136"
set -g status-style "bg=#191726,fg=#e0def4"
set -g status-left "#[bg=#65b1cd,fg=#232136,bold] #S #[bg=#191726] "
set -g status-right "#{?client_prefix,#[bg=#eb6f92#,fg=#232136#,bold] PREFIX #[default] ,}#[fg=#817c9c]%H:%M #[bg=#9ccfd8,fg=#232136,bold] #h "
setw -g window-status-format "#[fg=#817c9c] #I:#W #{?@workmux_status, #{@workmux_status},}"
setw -g window-status-current-format "#[fg=#65b1cd,bold] #I:#W#{?window_zoomed_flag, #[fg=#a3be8c]Z#[fg=#65b1cd],} #{?@workmux_status, #{@workmux_status},}"
set -g pane-border-style "fg=#433c59"
set -g pane-active-border-style "fg=#65b1cd"
set -g message-style "bg=#191726,fg=#e0def4"
set -g mode-style "bg=#65b1cd,fg=#232136"
