include current-theme.conf

font_family      JetBrainsMono Nerd Font Mono
font_size 11.5
modify_font cell_height 10px
narrow_symbols U+2022 1

window_padding_width 4

shell_integration enabled

wayland_titlebar_color system

mouse_map ctrl+left click grabbed,ungrabbed mouse_handle_click link

# macOS-only convenience: forward cmd+hjkl as alt+hjkl so tmux resize /
# smart-splits binds work with the macOS keyboard. Inert on Linux because
# the WM grabs Super before kitty sees it.
map cmd+h send_key alt+h
map cmd+j send_key alt+j
map cmd+k send_key alt+k
map cmd+l send_key alt+l

# Same idea for harpoon jumps: physical Alt key emits Command on this mac
# (Option/Command swapped in System Settings), and aerospace owns real Option
# for workspaces — so map cmd+1..4 to tmux's M-1..4 harpoon binds.
# send_key no-ops for number-row keys in this kitty, so emit the CSI-u bytes
# directly: 'N' codepoint (49-52) + modifier 3 (alt). tmux has extended-keys on
# + xterm-kitty:extkeys, so it decodes these to M-1..4 just like M-h for resize.
map cmd+1 send_text all \x1b[49;3u
map cmd+2 send_text all \x1b[50;3u
map cmd+3 send_text all \x1b[51;3u
map cmd+4 send_text all \x1b[52;3u

# Per-machine overrides (e.g. font_size on macOS, where the same monitor renders
# points smaller than Linux does). Lives at ~/.config/kitty/local.conf, is
# gitignored, and loads last so it wins. globinclude is silent when absent, so
# machines without a local.conf just use the defaults above.
globinclude local.conf
