# Gradual evening warm-down (was a single hard 21:00 jump to 4000K).
# Eye-fatigue is worst in the evenings, so ramp the colour temperature down in
# steps through the evening instead of one abrupt shift, and end warmer (3200K).

profile {
    time = 6:30
    identity = true
}

profile {
    time = 18:00
    temperature = 5000
}

profile {
    time = 20:00
    temperature = 4000
}

profile {
    time = 22:00
    temperature = 3200
}
