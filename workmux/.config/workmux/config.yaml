# workmux global config (stowed). Per-repo overrides go in .workmux.yaml at
# the repo root. Full option list: `workmux config reference`.

# Keep worktrees out of the projects tree — the default is a sibling
# '<project>__worktrees' dir, which tmux-sessionizer would pick up as a
# bogus project. {project} resolves to the main worktree's directory name.
worktree_dir: ~/.workmux/{project}

# 'workmux add <branch>' opens a tmux window in the current session with
# claude (the default <agent>) already running in the new worktree. Split a
# shell alongside with the usual prefix \ / prefix - when needed.
panes:
  - command: <agent>
    focus: true
nerdfont: true

# Top bar, not left sidebar. The left sidebar bills you in COLUMNS (25-50 of
# them) and columns are what code wants — line length, side-by-side diffs. The
# top bar bills 3 ROWS, the axis we have to spare. Same live per-agent status,
# affordable enough to leave on. Toggle: prefix w (workmux sidebar).
sidebar:
  position: top
  height: 3

# 'workmux merge' rebases the branch onto the base first — linear history,
# same shape the /merge skill produces.
merge_strategy: rebase
