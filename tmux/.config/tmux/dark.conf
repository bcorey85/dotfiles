# kanagawa-dragon — rebelot/kanagawa.nvim (values from Ghostty's built-in
# "Kanagawa Dragon" theme so terminal and tmux chrome match exactly).
# Sourced by ~/.tmux.conf based on ~/.cache/theme-mode. Toggle with prefix t.
#
# bg #1e1c1c (stock #181616 lifted one step, matching nvim + ghostty), float
# (status) #0d0c0c, fg #c5c9c5, grey (muted) #a6a69c, blue #8ba4b0, aqua
# #8ea4a2, green #8a9a7b, red #c4746e. Text on coloured segments uses the
# canvas bg #1e1c1c for contrast.
set -g window-style "fg=#c5c9c5,bg=#1e1c1c"
set -g status-style "bg=#0d0c0c,fg=#c5c9c5"
set -g status-left "#[bg=#8ba4b0,fg=#1e1c1c,bold] #S #[bg=#0d0c0c] "
set -g status-right "#{?client_prefix,#[bg=#c4746e#,fg=#1e1c1c#,bold] PREFIX #[default] ,}#[fg=#a6a69c]%H:%M #[bg=#8ea4a2,fg=#1e1c1c,bold] #h "
setw -g window-status-format "#[fg=#a6a69c] #I:#W "
setw -g window-status-current-format "#[fg=#8ba4b0,bold] #I:#W#{?window_zoomed_flag, #[fg=#8a9a7b]Z#[fg=#8ba4b0],} "
set -g pane-border-style "fg=#393836"
set -g pane-active-border-style "fg=#8ba4b0"
set -g message-style "bg=#0d0c0c,fg=#c5c9c5"
set -g mode-style "bg=#8ba4b0,fg=#1e1c1c"
