unbind C-b
set -g prefix C-Space
bind C-Space send-prefix
unbind Space

set -g base-index 1
setw -g pane-base-index 1
set -g mouse on
set -g history-limit 50000
set -g renumber-windows on
set -g detach-on-destroy off  # killing a session jumps to the next instead of detaching — pairs with sessionizer
set -g display-time 2000      # status messages linger 2s instead of the default 750ms
set -g aggressive-resize on   # size to the active client, not the smallest attached
set -g set-titles on          # reflect session:window in the terminal title
set -g set-titles-string "#S:#W"
set -g automatic-rename off   # I name windows; tmux stops renaming them to the running command
set -g allow-rename off       # programs can't rename windows via escape sequences either
set -g display-panes-time 2000  # pane numbers (prefix q) stay up 2s instead of the default 1s

# Vi-style copy mode + system clipboard (OSC52, cross-platform: mac/Linux/WSL)
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y send -X copy-selection-and-cancel

bind '\' split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Close: x = pane (default), X = whole window (confirm, since it kills every pane)
bind X confirm-before -p "kill window #W? (y/n)" kill-window

# Zoom-toggle between the two most-recent panes (e.g. editor <-> claude) fullscreen
bind -n M-o last-pane \; resize-pane -Z

bind -r k select-pane -U
bind -r j select-pane -D
# pane-left is C-h (smart-splits); prefix h is harpoon — see Harpoon section
bind -r l select-pane -R
# Last-pane — pane-level mirror of prefix ; (window) / M-; (session) / leader ; (nvim buffer)
bind -n C-\; last-pane

# Move window left/right
bind < swap-window -t -1\; select-window -t -1
bind > swap-window -t +1\; select-window -t +1

# Auto-equalize layouts
bind = select-layout even-horizontal
bind _ select-layout tiled

# Alternate window (last-window) — prefix ; mirrors nvim's leader-; alternate-buffer
bind \; last-window

# Session/window picker — choose-tree shows the full session>window>pane tree
bind o choose-tree -Zs

# Rename the current window, pre-filled with its current name
bind , command-prompt -I "#W" "rename-window '%%'"

# Harpoon — pin project dirs to slots, jump instantly (scripts/.local/bin/tmux-harpoon)
bind -n M-1 run-shell "~/.local/bin/tmux-harpoon jump 1"
bind -n M-2 run-shell "~/.local/bin/tmux-harpoon jump 2"
bind -n M-3 run-shell "~/.local/bin/tmux-harpoon jump 3"
bind -n M-4 run-shell "~/.local/bin/tmux-harpoon jump 4"
bind -n M-\; switch-client -l   # last-session — session-level mirror of prefix ; (last-window)
bind a run-shell "~/.local/bin/tmux-harpoon add"                     # pin current project
bind h display-popup -w 70% -h 60% -E "~/.local/bin/tmux-harpoon menu"    # edit/reorder slots — matches nvim leader-h

# smart-splits.nvim: cross-boundary nav (C-hjkl) + resize (A-hjkl).
# `@pane-is-vim` is set by the nvim plugin on startup; when true, forward the
# keystroke to nvim, else handle in tmux.
bind-key -n C-h if -F "#{@pane-is-vim}" 'send-keys C-h' 'select-pane -L'
bind-key -n C-j if -F "#{@pane-is-vim}" 'send-keys C-j' 'select-pane -D'
bind-key -n C-k if -F "#{@pane-is-vim}" 'send-keys C-k' 'select-pane -U'
bind-key -n C-l if -F "#{@pane-is-vim}" 'send-keys C-l' 'select-pane -R'
bind-key -n M-h if -F "#{@pane-is-vim}" 'send-keys M-h' 'resize-pane -L 3'
bind-key -n M-j if -F "#{@pane-is-vim}" 'send-keys M-j' 'resize-pane -D 3'
bind-key -n M-k if -F "#{@pane-is-vim}" 'send-keys M-k' 'resize-pane -U 3'
bind-key -n M-l if -F "#{@pane-is-vim}" 'send-keys M-l' 'resize-pane -R 3'

# copy-mode is a separate (modal) key table, so the root C-hjkl above don't
# apply there. Re-bind them so pane nav keeps working while reading scrollback.
# select-pane only moves focus — the source pane stays in copy mode, so you can
# C-h back and resume where you left off. (plain hjkl still move the copy cursor)
bind-key -T copy-mode-vi C-h select-pane -L
bind-key -T copy-mode-vi C-j select-pane -D
bind-key -T copy-mode-vi C-k select-pane -U
bind-key -T copy-mode-vi C-l select-pane -R

set-option -sg escape-time 10

# Fix colors and enable true color support
set -g default-terminal "tmux-256color"
set -gs terminal-overrides ",*:RGB"
set -s set-clipboard on

set -g extended-keys on
set -as terminal-features 'xterm*:extkeys'  # matches xterm-kitty AND xterm-ghostty

# Enable undercurl and colored underlines (for Neovim diagnostics)
set -ga terminal-features ",*:usstyle"

# Enable focus events for autoread
set -g focus-events on

# snacks.nvim image module: pass Kitty Graphics Protocol escape sequences
# through tmux to the terminal (required for inline image rendering).
set -g allow-passthrough on

# Catppuccin Mocha theme (Maia BG)
# Pin base pane fg/bg to explicit truecolor. Without this, default text routes
# through the terminal's 256-color palette — ghostty's regenerated palette
# renders the default fg with a yellow tint (kitty is unaffected). Explicit RGB
# renders identically across kitty/ghostty.
set -g window-style "fg=#cdd6f4,bg=#282c34"
set -g status-style "bg=#323844,fg=#cdd6f4"
set -g status-left "#[bg=#94e2d5,fg=#282c34,bold] #S #[bg=#323844] "
set -g status-right "#{?client_prefix,#[bg=#f38ba8#,fg=#282c34#,bold] PREFIX #[default] ,}#[fg=#6c7086]%H:%M #[bg=#b4befe,fg=#282c34,bold] #h "
set -g status-left-length 30
set -g status-right-length 50
setw -g window-status-format "#[fg=#6c7086] #I:#W "
setw -g window-status-current-format "#[fg=#94e2d5,bold] #I:#W#{?window_zoomed_flag, #[fg=#f9e2af]Z#[fg=#94e2d5],} "
set -g pane-border-style "fg=#3b4252"
set -g pane-active-border-style "fg=#94e2d5"
set -g pane-border-status top   # label each pane border with its index + running command
set -g pane-border-format " #P #{pane_current_command} "
set -g message-style "bg=#3b4252,fg=#cdd6f4"
set -g mode-style "bg=#3b4252,fg=#cdd6f4"

# Reload config
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

# Sessionizer
bind f display-popup -E -w 60% -h 60% "~/.local/bin/tmux-sessionizer"

# Scratch shell — throwaway floating terminal over the current layout
bind t display-popup -d "#{pane_current_path}" -w 80% -h 80% -E

# Dump this pane's full scrollback into nvim (opens at the bottom) for real search/yank
bind e capture-pane -S - \; save-buffer /tmp/tmux-scrollback \; delete-buffer \; \
  display-popup -w 95% -h 95% -E 'nvim + /tmp/tmux-scrollback'

# Fugitive status popup - throwaway nvim opening fugitive's :Git status buffer
# on the current repo, for quick cross-file staging without leaving tmux.
# FUGITIVE_POPUP makes `q` in the status buffer run `:qa` so it dismisses the
# popup like lazygit.
bind g if-shell "git -C '#{pane_current_path}' rev-parse --git-dir >/dev/null 2>&1" {
  display-popup -d "#{pane_current_path}" -w 100% -h 100% -E 'FUGITIVE_POPUP=1 nvim -c "Git" -c "silent! only"'
} {
  display-message "not a git repository"
}

# Git hunk quickfix staging popup (s = stage) - boots a throwaway nvim straight
# into the repo-wide gitsigns hunk quickfix list (the <leader>cq flow) for fast
# cross-file staging, skipping fugitive's status buffer. GIT_QF_POPUP makes `q`
# in the qf window run `:qa` so the popup dismisses like lazygit. (prefix o
# already covers the session tree that tmux's default `s` would have.)
bind s if-shell "git -C '#{pane_current_path}' rev-parse --git-dir >/dev/null 2>&1" {
  display-popup -d "#{pane_current_path}" -w 100% -h 100% -E 'GIT_QF_POPUP=1 nvim -c "GitHunksQf"'
} {
  display-message "not a git repository"
}

# System monitor popup
bind b display-popup -d "#{pane_current_path}" -w 95% -h 95% -E "btop"

# Project search popup (rg-as-live-reload via fzf --disabled, opens result in nvim)
unbind /
bind / display-popup -d "#{pane_current_path}" -w 95% -h 95% -E \
  "fzf --disabled --ansi --delimiter=: \
     --bind 'start:reload:rg --line-number --no-heading --color=always {q} || true' \
     --bind 'change:reload:rg --line-number --no-heading --color=always {q} || true' \
     --preview 'bat --color=always --highlight-line {2} {1}' --preview-window='up,60%' \
     --bind 'enter:become(nvim +{2} {1})'"

# Obsidian vault search popup (enter=read in glow, ctrl-e=edit in nvim)
bind v display-popup -w 95% -h 95% -E \
  "fd -e md . ~/vault | fzf --header 'enter=read | ctrl-e=edit' --preview '~/.local/bin/glow-fit -s dark {}' --preview-window='right,60%' --bind 'enter:become(~/.local/bin/glow-fit -p {})' --bind 'ctrl-e:become(nvim {})'"

# Reading mode: zoom the nvim pane and toggle reading mode (zen + readonly buffer + q to exit).
# If the current pane is nvim, zoom it and toggle. If another pane in the window
# is nvim, jump to it first. Both resize-pane -Z and toggle() are idempotent toggles,
# so pressing prefix-m twice restores the original state.
bind m if -F "#{@pane-is-vim}" {
    resize-pane -Z
    send-keys Escape ":lua require('util.reading').toggle()" Enter
} {
    run-shell "vim_pane=\$(tmux list-panes -F '##{pane_id} ##{@pane-is-vim}' | awk '\$2==1{print \$1; exit}'); \
if [ -n \"\$vim_pane\" ]; then \
  tmux select-pane -t \"\$vim_pane\"; \
  tmux resize-pane -Z; \
  tmux send-keys Escape ':lua require(\"util.reading\").toggle()' Enter; \
else \
  tmux display-message 'no nvim pane in window'; \
fi"
}

# Paste clipboard image to ~/Pictures/clipboard/ and type its path into the active pane
bind -N "Paste clipboard image to file + path into pane" C-v run-shell -b "$HOME/.local/bin/clip-image"
