include current-theme.conf

font_family      CommitMono Nerd Font Mono
font_size 10.0
modify_font cell_height 8px
narrow_symbols U+2022 1

window_padding_width 4

shell_integration enabled

wayland_titlebar_color system

mouse_map ctrl+left click grabbed,ungrabbed mouse_handle_click link

# macOS-only convenience: forward cmd+hjkl as alt+hjkl so tmux resize /
# smart-splits binds work with the macOS keyboard. Inert on Linux because
# the WM grabs Super before kitty sees it.
map cmd+h send_key alt+h
map cmd+j send_key alt+j
map cmd+k send_key alt+k
map cmd+l send_key alt+l
map cmd+; send_key alt+semicolon
