# modus light — modus-operandi-tinted (miikanissi/modus-themes.nvim port).
# Sourced by the switcher (theme-mode use modus light).
# bg #fbf7f0, status #efe9dd, fg #000000, muted #595959,
# accent #531ab6 (violet), cyan #005e8b, green #006800, red #a60000.
set -g window-style "fg=#000000,bg=#fbf7f0"
set -g status-style "bg=#efe9dd,fg=#000000"
set -g status-left "#[bg=#531ab6,fg=#fbf7f0,bold] #S #[bg=#efe9dd] "
set -g status-right "#{?client_prefix,#[bg=#a60000#,fg=#fbf7f0#,bold] PREFIX #[default] ,}#[fg=#595959]%H:%M #[bg=#005e8b,fg=#fbf7f0,bold] #h "
setw -g window-status-format "#[fg=#595959] #I:#W "
setw -g window-status-current-format "#[fg=#531ab6,bold] #I:#W#{?window_zoomed_flag, #[fg=#006800]Z#[fg=#531ab6],} "
set -g pane-border-style "fg=#9f9690"
set -g pane-active-border-style "fg=#531ab6"
set -g message-style "bg=#efe9dd,fg=#000000"
set -g mode-style "bg=#dfa0f0,fg=#000000"
