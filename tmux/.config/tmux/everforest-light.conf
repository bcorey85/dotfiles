# everforest light (medium) — sainnhe/everforest
# Sourced by the theme-mode switcher (theme-use everforest light).
# bg #fdf6e3, status (bg_dim) #efebd4, fg #5c6a72, muted #939f91,
# blue #3a94c5, aqua #35a77c, green #8da101, red #f85552. Text on coloured
# segments uses the canvas bg #fdf6e3 for contrast.
set -g window-style "fg=#5c6a72,bg=#fdf6e3"
set -g status-style "bg=#efebd4,fg=#5c6a72"
set -g status-left "#[bg=#3a94c5,fg=#fdf6e3,bold] #S #[bg=#efebd4] "
set -g status-right "#{?client_prefix,#[bg=#f85552#,fg=#fdf6e3#,bold] PREFIX #[default] ,}#(~/.local/bin/claude-attention badge)#[fg=#939f91]%H:%M #[bg=#35a77c,fg=#fdf6e3,bold] #h "
setw -g window-status-format "#[fg=#939f91] #I:#W "
setw -g window-status-current-format "#[fg=#3a94c5,bold] #I:#W#{?window_zoomed_flag, #[fg=#8da101]Z#[fg=#3a94c5],} "
set -g pane-border-style "fg=#ddd8be"
set -g pane-active-border-style "fg=#3a94c5"
set -g message-style "bg=#efebd4,fg=#5c6a72"
set -g mode-style "bg=#3a94c5,fg=#fdf6e3"
