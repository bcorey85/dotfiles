# kanagawa dark — rebelot/kanagawa.nvim "wave" variant.
# Sourced by the switcher (theme-mode use kanagawa).
# bg #1f1f28, status #2a2a37, fg #dcd7ba, muted #727169,
# blue #7e9cd8, aqua #7fb4ca, green #98bb6c, red #c34043.
set -g window-style "fg=#dcd7ba,bg=#1f1f28"
set -g status-style "bg=#2a2a37,fg=#dcd7ba"
set -g status-left "#[bg=#7e9cd8,fg=#1f1f28,bold] #S #[bg=#2a2a37] "
set -g status-right "#{?client_prefix,#[bg=#c34043#,fg=#1f1f28#,bold] PREFIX #[default] ,}#[fg=#727169]%H:%M #[bg=#7fb4ca,fg=#1f1f28,bold] #h "
setw -g window-status-format "#[fg=#727169] #I:#W "
setw -g window-status-current-format "#[fg=#7e9cd8,bold] #I:#W#{?window_zoomed_flag, #[fg=#98bb6c]Z#[fg=#7e9cd8],} "
set -g pane-border-style "fg=#363646"
set -g pane-active-border-style "fg=#7e9cd8"
set -g message-style "bg=#2a2a37,fg=#dcd7ba"
set -g mode-style "bg=#2d4f67,fg=#dcd7ba"
