# catppuccin light — the "latte" flavour's own palette.
# bg #eff1f5, status #dce0e8, fg #4c4f69, muted #6c6f85,
# blue #1e66f5, sky #04a5e5, green #40a02b, red #d20f39.
set -g window-style "fg=#4c4f69,bg=#eff1f5"
set -g status-style "bg=#dce0e8,fg=#4c4f69"
set -g status-left "#[bg=#1e66f5,fg=#eff1f5,bold] #S #[bg=#dce0e8] "
set -g status-right "#{?client_prefix,#[bg=#d20f39#,fg=#eff1f5#,bold] PREFIX #[default] ,}#[fg=#6c6f85]%H:%M #[bg=#04a5e5,fg=#eff1f5,bold] #h "
setw -g window-status-format "#[fg=#6c6f85] #I:#W "
setw -g window-status-current-format "#[fg=#1e66f5,bold] #I:#W#{?window_zoomed_flag, #[fg=#40a02b]Z#[fg=#1e66f5],} "
set -g pane-border-style "fg=#bcc0cc"
set -g pane-active-border-style "fg=#1e66f5"
set -g message-style "bg=#dce0e8,fg=#4c4f69"
set -g mode-style "bg=#bcc0cc,fg=#4c4f69"
