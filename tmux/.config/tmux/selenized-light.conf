# selenized light — jan-warchol's Selenized, served by maxmx03/solarized.nvim
# (palette = "selenized"). Raw palette, no contrast tuning.
# Sourced by the switcher (theme-mode use selenized light).
# bg #fbf3db, status #ece3cc, fg #53676d, muted #909995,
# blue #0072d4, cyan #009c8f, green #489100, red #d2212d.
set -g window-style "fg=#53676d,bg=#fbf3db"
set -g status-style "bg=#ece3cc,fg=#53676d"
set -g status-left "#[bg=#0072d4,fg=#fbf3db,bold] #S #[bg=#ece3cc] "
set -g status-right "#{?client_prefix,#[bg=#d2212d#,fg=#fbf3db#,bold] PREFIX #[default] ,}#[fg=#909995]%H:%M #[bg=#009c8f,fg=#fbf3db,bold] #h "
setw -g window-status-format "#[fg=#909995] #I:#W #{?@workmux_status, #{@workmux_status},}"
setw -g window-status-current-format "#[fg=#0072d4,bold] #I:#W#{?window_zoomed_flag, #[fg=#489100]Z#[fg=#0072d4],} #{?@workmux_status, #{@workmux_status},}"
set -g pane-border-style "fg=#d5cdb6"
set -g pane-active-border-style "fg=#0072d4"
set -g message-style "bg=#ece3cc,fg=#53676d"
set -g mode-style "bg=#d5cdb6,fg=#53676d"
