# github_dark_default — projekt0n/github-nvim-theme
# Sourced by ~/.tmux.conf based on ~/.cache/theme-mode. Toggle with prefix T
# (theme-mode).
#
# bg #0d1117, float (status) #010409, fg #e6edf3, grey (muted) #7d8590,
# blue #58a6ff, cyan #76e3ea, green #3fb950, red #f85149. Text on coloured
# segments uses the canvas bg #0d1117 for contrast.
set -g window-style "fg=#e6edf3,bg=#0d1117"
set -g status-style "bg=#010409,fg=#e6edf3"
set -g status-left "#[bg=#58a6ff,fg=#0d1117,bold] #S #[bg=#010409] "
set -g status-right "#{?client_prefix,#[bg=#f85149#,fg=#0d1117#,bold] PREFIX #[default] ,}#[fg=#7d8590]%H:%M #[bg=#76e3ea,fg=#0d1117,bold] #h "
setw -g window-status-format "#[fg=#7d8590] #I:#W #{?@workmux_status, #{@workmux_status},}"
setw -g window-status-current-format "#[fg=#58a6ff,bold] #I:#W#{?window_zoomed_flag, #[fg=#3fb950]Z#[fg=#58a6ff],} #{?@workmux_status, #{@workmux_status},}"
set -g pane-border-style "fg=#30363d"
set -g pane-active-border-style "fg=#58a6ff"
set -g message-style "bg=#010409,fg=#e6edf3"
set -g mode-style "bg=#58a6ff,fg=#0d1117"
