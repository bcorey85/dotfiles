# catppuccin dark — the "mocha" flavour's own palette.
# Sourced by the switcher (theme-mode use catppuccin).
# bg #1e1e2e, status #181825, fg #cdd6f4, muted #9399b2,
# blue #89b4fa, sky #89dceb, green #a6e3a1, red #f38ba8.
set -g window-style "fg=#cdd6f4,bg=#1e1e2e"
set -g status-style "bg=#181825,fg=#cdd6f4"
set -g status-left "#[bg=#89b4fa,fg=#1e1e2e,bold] #S #[bg=#181825] "
set -g status-right "#{?client_prefix,#[bg=#f38ba8#,fg=#1e1e2e#,bold] PREFIX #[default] ,}#[fg=#9399b2]%H:%M #[bg=#89dceb,fg=#1e1e2e,bold] #h "
setw -g window-status-format "#[fg=#9399b2] #I:#W #{?@workmux_status, #{@workmux_status},}"
setw -g window-status-current-format "#[fg=#89b4fa,bold] #I:#W#{?window_zoomed_flag, #[fg=#a6e3a1]Z#[fg=#89b4fa],} #{?@workmux_status, #{@workmux_status},}"
set -g pane-border-style "fg=#45475a"
set -g pane-active-border-style "fg=#89b4fa"
set -g message-style "bg=#181825,fg=#cdd6f4"
set -g mode-style "bg=#45475a,fg=#cdd6f4"
