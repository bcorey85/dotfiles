# tokyonight dark — folke/tokyonight.nvim "night" variant (the darkest dark).
# Sourced by the switcher (theme-mode use tokyonight).
# bg #1a1b26, status #16161e, fg #c0caf5, muted #565f89,
# blue #7aa2f7, cyan #7dcfff, green #9ece6a, red #f7768e.
set -g window-style "fg=#c0caf5,bg=#1a1b26"
set -g status-style "bg=#16161e,fg=#c0caf5"
set -g status-left "#[bg=#7aa2f7,fg=#1a1b26,bold] #S #[bg=#16161e] "
set -g status-right "#{?client_prefix,#[bg=#f7768e#,fg=#1a1b26#,bold] PREFIX #[default] ,}#[fg=#565f89]%H:%M #[bg=#7dcfff,fg=#1a1b26,bold] #h "
setw -g window-status-format "#[fg=#565f89] #I:#W "
setw -g window-status-current-format "#[fg=#7aa2f7,bold] #I:#W#{?window_zoomed_flag, #[fg=#9ece6a]Z#[fg=#7aa2f7],} "
set -g pane-border-style "fg=#292e42"
set -g pane-active-border-style "fg=#7aa2f7"
set -g message-style "bg=#16161e,fg=#c0caf5"
set -g mode-style "bg=#283457,fg=#c0caf5"
