unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

set -g base-index 1
setw -g pane-base-index 1
set -g mouse on
set -g history-limit 50000
set -g renumber-windows on
set -g detach-on-destroy off  # killing a session jumps to the next instead of detaching — pairs with sessionizer

# The server inherits a bare PATH (no ~/.local/bin), so commands spawned by
# run-shell / new-session — claude, sessionizer scripts — silently die with
# 127. Prepend it server-wide; individual scripts no longer need their own
# PATH workarounds.
set-environment -g PATH "$HOME/.local/bin:$PATH"
set -g display-time 2000      # status messages linger 2s instead of the default 750ms
set -g aggressive-resize on   # size to the active client, not the smallest attached
set -g set-titles on          # reflect session:window in the terminal title
set -g set-titles-string "#S:#W"
set -g automatic-rename off   # I name windows; tmux stops renaming them to the running command
set -g allow-rename off       # programs can't rename windows via escape sequences either
set -g display-panes-time 2000  # pane numbers (prefix q) stay up 2s instead of the default 1s
set -g status-interval 5      # agent badge (claude-attention) decays promptly; hooks force instant refresh

# Vi-style copy mode + system clipboard (OSC52, cross-platform: mac/Linux/WSL)
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# Companion claude toggle with C-' (no prefix): stash/restore a pair-programming
# claude pane in the current window (scripts/.local/bin/claude-companion). The
# conversation survives stashing — it hides in a _claude window, it isn't killed.
# Managed background agents are separate: prefix y / prefix u (session manager).
# Relies on extended-keys + extkeys (set below) and a terminal that speaks the
# CSI-u keyboard protocol (kitty/ghostty). Copy-mode is prefix-[ (its default).
bind -n "C-'" run-shell "~/.local/bin/claude-companion '#{pane_current_path}'"

bind '\' split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Close: x = pane (default), X = whole window (confirm, since it kills every pane)
bind X confirm-before -p "kill window #W? (y/n)" kill-window

# Zoom-toggle between the two most-recent panes (e.g. editor <-> claude) fullscreen
bind -n M-o last-pane \; resize-pane -Z
# Last-window, no prefix — quick toggle between code <-> CLI windows
bind -n C-\; last-window

# Half-page scroll with C-M-u/C-M-d.
#   claude in its fullscreen alt-screen TUI (no C-M-u handler) -> forward its own scroll key
#   other alternate-screen TUIs (vim/less)                     -> forward C-M-u unchanged
#   normal shell pane, incl. claude's default non-alt-screen TUI -> tmux copy-mode scroll
bind -n C-M-u {
  if -F '#{alternate_on}' {
    if -F '#{==:#{pane_current_command},claude}' { send-keys PPage } { send-keys C-M-u }
  } {
    copy-mode ; send-keys -X halfpage-up
  }
}
bind -n C-M-d {
  if -F '#{alternate_on}' {
    if -F '#{==:#{pane_current_command},claude}' { send-keys NPage } { send-keys C-M-d }
  } {
    send-keys -X halfpage-down
  }
}

# Move window left/right
bind < swap-window -t -1\; select-window -t -1
bind > swap-window -t +1\; select-window -t +1

# Auto-equalize layouts
bind = select-layout even-horizontal
bind _ select-layout tiled

# Session/window picker — choose-tree shows the full session>window>pane tree
bind o choose-tree -Zs

# Rename the current window, pre-filled with its current name
bind , command-prompt -I "#W" "rename-window '%%'"

# Harpoon — pin project dirs to slots, jump instantly (scripts/.local/bin/tmux-harpoon)
bind -n M-1 run-shell "~/.local/bin/tmux-harpoon jump 1"
bind -n M-2 run-shell "~/.local/bin/tmux-harpoon jump 2"
bind -n M-3 run-shell "~/.local/bin/tmux-harpoon jump 3"
bind -n M-4 run-shell "~/.local/bin/tmux-harpoon jump 4"
bind -n M-\; switch-client -l   # last-session — session-level mirror of prefix ; (last-window)
bind a run-shell "~/.local/bin/tmux-harpoon add"                     # pin current project
bind Tab display-popup -w 70% -h 60% -E "~/.local/bin/tmux-harpoon menu"    # edit/reorder slots — matches nvim leader-<Tab>

# smart-splits.nvim: cross-boundary nav (C-hjkl) + resize (A-hjkl).
# `@pane-is-vim` is set by the nvim plugin on startup; when true, forward the
# keystroke to nvim, else handle in tmux.
bind-key -n C-h if -F "#{@pane-is-vim}" 'send-keys C-h' 'select-pane -L'
bind-key -n C-j if -F "#{@pane-is-vim}" 'send-keys C-j' 'select-pane -D'
bind-key -n C-k if -F "#{@pane-is-vim}" 'send-keys C-k' 'select-pane -U'
bind-key -n C-l if -F "#{@pane-is-vim}" 'send-keys C-l' 'select-pane -R'
bind-key -n M-h if -F "#{@pane-is-vim}" 'send-keys M-h' 'resize-pane -L 3'
bind-key -n M-j if -F "#{@pane-is-vim}" 'send-keys M-j' 'resize-pane -D 3'
bind-key -n M-k if -F "#{@pane-is-vim}" 'send-keys M-k' 'resize-pane -U 3'
bind-key -n M-l if -F "#{@pane-is-vim}" 'send-keys M-l' 'resize-pane -R 3'

# copy-mode is a separate (modal) key table, so the root C-hjkl above don't
# apply there. Re-bind them so pane nav keeps working while reading scrollback.
# select-pane only moves focus — the source pane stays in copy mode, so you can
# C-h back and resume where you left off. (plain hjkl still move the copy cursor)
bind-key -T copy-mode-vi C-h select-pane -L
bind-key -T copy-mode-vi C-j select-pane -D
bind-key -T copy-mode-vi C-k select-pane -U
bind-key -T copy-mode-vi C-l select-pane -R

set-option -sg escape-time 10

# Fix colors and enable true color support
set -g default-terminal "tmux-256color"
set -gs terminal-overrides ",*:RGB"
set -s set-clipboard on

# MUST stay 'always' (not 'on'): the bare C-. / C-' / C-; binds above are
# recognised by tmux only while the terminal is always sending CSI-u — with 'on'
# tmux enables extended keys just for apps that request them, so those binds go
# dead at the shell. This did trip snacks.nvim image detection (its #2332
# workaround only fires when this value ends in " on"), so the freeze is fixed on
# the nvim side instead — see plugins/snacks.lua (pre-seeds terminal detection).
set -g extended-keys always
set -g extended-keys-format csi-u          # CSI-u keyboard protocol (kitty-compat, unambiguous modifiers)
set -as terminal-features 'xterm*:extkeys'  # matches xterm-kitty AND xterm-ghostty

# Enable undercurl and colored underlines (for Neovim diagnostics)
set -ga terminal-features ",*:usstyle"

# Enable focus events for autoread
set -g focus-events on

# snacks.nvim image module: pass Kitty Graphics Protocol escape sequences
# through tmux to the terminal (required for inline image rendering).
set -g allow-passthrough on

# ─── Theme (github_dark_dimmed/github_light, dark/light) ────────────────────
# Colours live in ~/.config/tmux/github-{dark,light}.conf. The active file is
# chosen from the shared state file ~/.cache/theme-mode, written by the
# `theme-mode` script — which also flips neovim (nvim polls the same file).
# `prefix T` toggles both tmux and nvim together. Default to dark when the
# state file is missing.
if-shell '[ "$(cat ~/.cache/theme-mode 2>/dev/null)" = light ]' \
  'source-file ~/.config/tmux/github-light.conf' \
  'source-file ~/.config/tmux/github-dark.conf'
bind t run-shell "~/.local/bin/theme-mode toggle"

# Theme-independent status/pane structure (colours are set by the theme files).
set -g status-left-length 30
set -g status-right-length 50
set -g pane-border-status top   # label each pane border with its index + running command
set -g pane-border-format " #P #{pane_current_command} "
# Heavier popup frame (all popups). Alternatives: double, rounded, padded, single.
set -g popup-border-lines heavy

# Reload config
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

# Sessionizer
bind f display-popup -E -w 60% -h 60% "~/.local/bin/tmux-sessionizer"

# Review popup — codediff explorer over the current pane's repo, from any
# pane (e.g. straight out of a Claude Code chat). Routed through
# tmux-host-popup at 100%x100% like prefix g/s, so pressed inside the C-.
# agent popup it breaks out to the outer client at true full size.
# This shadows tmux's default `prefix d` (detach-client) — detach moved to D.
bind d if-shell "git -C '#{pane_current_path}' rev-parse --git-dir >/dev/null 2>&1" {
  run-shell "~/.local/bin/tmux-host-popup '#{client_name}' '#{session_name}' '#{pane_current_path}' 100% 100% 'CODEDIFF_POPUP=1 nvim -c \"CodeDiff\"'"
} {
  display-message "not a git repository"
}
bind D detach-client

# Neogit status popup - throwaway nvim opening neogit's status buffer
# on the current repo, for quick cross-file staging without leaving tmux.
# NEOGIT_POPUP makes `q` in the status buffer run `:qa` so it dismisses the
# popup like lazygit. Routed through tmux-host-popup so that, pressed inside
# the C-. agent popup (a nested client where 100% would mean the popup's own
# size), it breaks out to the outer client at true full size and brings the
# agent popup back afterwards.
bind g if-shell "git -C '#{pane_current_path}' rev-parse --git-dir >/dev/null 2>&1" {
  run-shell "~/.local/bin/tmux-host-popup '#{client_name}' '#{session_name}' '#{pane_current_path}' 100% 100% 'NEOGIT_POPUP=1 nvim -c \"Neogit\" -c \"silent! only\"'"
} {
  display-message "not a git repository"
}

# Git hunk quickfix staging popup (s = stage) - boots a throwaway nvim straight
# into the repo-wide gitsigns hunk quickfix list (the <leader>cq flow) for fast
# cross-file staging, skipping fugitive's status buffer. GIT_QF_POPUP makes `q`
# in the qf window run `:qa` so the popup dismisses like lazygit. (prefix o
# already covers the session tree that tmux's default `s` would have.)
# Routed through tmux-host-popup for the same break-out-of-the-agent-popup
# behavior as prefix g above.
bind s if-shell "git -C '#{pane_current_path}' rev-parse --git-dir >/dev/null 2>&1" {
  run-shell "~/.local/bin/tmux-host-popup '#{client_name}' '#{session_name}' '#{pane_current_path}' 100% 100% 'GIT_QF_POPUP=1 nvim -c \"GitHunksQf\"'"
} {
  display-message "not a git repository"
}

# System monitor popup
bind b display-popup -d "#{pane_current_path}" -w 95% -h 95% -E "btop"

# GitHub dashboard popup — PRs/issues/CI across repos via gh-dash
# (install/gh-dash); q dismisses it like the other TUI popups. On failure
# (extension missing, gh unauthenticated) hold the popup open so the error
# is readable instead of flash-closing.
bind P display-popup -d "#{pane_current_path}" -w 100% -h 100% -E \
  "gh dash || { echo; echo 'gh dash failed — run install/gh-dash (needs gh auth login). enter to close'; read -r _; }"

# Docker dashboard popup — containers/images/volumes/logs via lazydocker
# (install/deps); q dismisses it like the other TUI popups. On failure (not
# installed, docker daemon down) hold the popup open so the error is readable.
# Shadows tmux's default `prefix l` (last-window) — that lives on C-; and
# prefix ; already.
bind l display-popup -d "#{pane_current_path}" -w 100% -h 100% -E \
  "lazydocker || { echo; echo 'lazydocker failed — is it installed and the docker daemon running? enter to close'; read -r _; }"

# Project search popups — mirror the nvim snacks pair (<leader>/ grep, <leader><space> files):
# prefix /     live grep file CONTENTS (rg reload on every keystroke), enter opens nvim at the line
# prefix Space find FILES by name (fd), enter opens nvim
unbind /
bind / display-popup -d "#{pane_current_path}" -w 95% -h 95% -E \
  "fzf --disabled --ansi --delimiter=: \
     --bind 'start:reload:rg --line-number --no-heading --color=always {q} || true' \
     --bind 'change:reload:rg --line-number --no-heading --color=always {q} || true' \
     --preview 'bat --color=always --highlight-line {2} {1}' --preview-window='up,60%' \
     --bind 'enter:become(nvim +{2} {1})'"
bind Space display-popup -d "#{pane_current_path}" -w 95% -h 95% -E \
  "fd --type f --hidden --exclude .git | fzf \
     --preview 'bat --color=always {}' --preview-window='up,60%' \
     --bind 'enter:become(nvim {})'"

# nvim-orgmode from any pane (not just inside nvim). Throwaway nvim driven
# straight into org capture / agenda; auto-closes when you finalize or quit.
# Mirrors Doom's SPC n notes prefix. `prefix n` opens a which-key style menu
# (native display-menu — no plugin); the same keystrokes still work fast
# (Ctrl+Space n c ~= SPC n c). `prefix n` shadows tmux's default next-window.
bind n display-menu -T "#[align=centre fg=blue] org notes " -x C -y C \
  "Capture"  c "display-popup -w 100% -h 100% -E '~/.local/bin/org-popup capture'" \
  "Journal"  j "display-popup -w 100% -h 100% -E '~/.local/bin/org-popup capture j'" \
  "Agenda"   a "display-popup -w 100% -h 100% -E '~/.local/bin/org-popup agenda'" \
  "Todos"    t "display-popup -w 100% -h 100% -E '~/.local/bin/org-popup todos'"

# Obsidian vault search popup (enter=read in glow, ctrl-e=edit in nvim)
bind v display-popup -w 95% -h 95% -E \
  "fd -e md . ~/vault | fzf --header 'enter=read | ctrl-e=edit' --preview '~/.local/bin/glow-fit -s dark {}' --preview-window='right,60%' --bind 'enter:become(~/.local/bin/glow-fit -p {})' --bind 'ctrl-e:become(nvim {})'"

# Reading mode: zoom the nvim pane (jumping to it first if needed) and toggle
# reading mode (zen + readonly buffer + q to exit). Idempotent — prefix-m twice
# restores the original state. (scripts/.local/bin/tmux-reading-mode)
bind m run-shell "~/.local/bin/tmux-reading-mode"

# Paste clipboard image to ~/Pictures/clipboard/ and type its path into the active pane
bind -N "Paste clipboard image to file + path into pane" C-v run-shell -b "$HOME/.local/bin/clip-image"

# ─── Resurrect / Continuum — crash-proof sessions ───────────────────────────
# Server dies (reboot, crash, OOM) -> start tmux and every session/window/pane
# comes back: names, cwds, layouts, visible pane contents. Continuum autosaves
# every 10 min and auto-restores on server start, so the worst case is losing
# 10 minutes of layout drift, not the whole cockpit. Manual: prefix C-s save,
# prefix C-r restore. Installed by install/tmux-plugins (plain git clones, no
# TPM); run-shells are guarded so machines that haven't run it don't error.
set -g @resurrect-capture-pane-contents 'on'
# Relaunch claude panes as `claude --continue` on restore — resumes the most
# recent conversation for that pane's cwd, so agent panes come back mid-task.
# mprocs relaunches with its saved command line (resurrect restores full
# args), so both repo-root and --config-based launches from `dev` come back.
set -g @resurrect-processes '"~claude->claude --continue" mprocs'
set -g @continuum-save-interval '10'
set -g @continuum-restore 'on'
if-shell '[ -f ~/.tmux/plugins/tmux-resurrect/resurrect.tmux ]' \
  'run-shell ~/.tmux/plugins/tmux-resurrect/resurrect.tmux'
# Continuum embeds its autosave trigger inside status-right, so it must run
# AFTER the theme file above (which owns status-right). theme-mode re-arms it
# after every runtime theme toggle for the same reason.
if-shell '[ -f ~/.tmux/plugins/tmux-continuum/continuum.tmux ]' \
  'run-shell ~/.tmux/plugins/tmux-continuum/continuum.tmux'

# ─── Claude session manager — picker + live agent status ────────────────────
# C-/ (no prefix; see below): fzf picker of every running Claude session with
# working/waiting/idle status (stamped by Claude Code hooks in
# ~/.claude/settings.json) and live preview; enter jumps, ctrl-x kills.
# The picker flow lives in ~/.local/bin/claude-picker, NOT the plugin's
# list.sh/picker.sh: the plugin attaches the jumped-to session INSIDE the
# picker popup, which would pin it at picker size (popups can't be resized) —
# claude-picker instead closes the picker and re-opens the session in a fresh
# popup at the agent size below. Rows/state still come from `picker.sh --list`.
# C-/ again inside the picker closes it (toggle, like C-. on the agent popup):
# the popup runs bare fzf — not a nested client — so tmux never sees the second
# press; claude-picker's own fzf call binds ctrl-/:abort (the plugin clone no
# longer carries a local patch for this).
# prefix y: launch/attach a Claude session for the current directory in a
# popup. Installed by install/tmux-plugins.
# Prefix is 'agent-' (not the default 'claude-') so project sessions for repos
# literally named claude-* (e.g. ~/dev/claude-code) aren't mistaken for agents.
set -g @claude_session_prefix 'agent-'
# Agent popup shaped like nvim's reading mode: full height, width capped for
# readable line length / eye fatigue (zen is 120 text cols; +4 covers the popup
# border and claude's own padding). Read at popup-open time by launch.sh (C-.
# and prefix y), claude-picker --attach (C-/ jumps), and tmux-host-popup
# --reopen (agent popup restore after prefix g/s), so every agent popup gets
# this shape. The picker itself is hardcoded at 90%x90% in claude-picker for
# the list + preview. Popups center horizontally by default.
set -g @claude_popup_width '124'
set -g @claude_popup_height '100%'
# C-. (no prefix, CSI-u terminals): toggle the agent popup — open it anywhere,
# press again inside to close. Same key both ways because the popup is a nested
# client on this server, so the binding fires with the inner client's context.
bind -n 'C-.' run-shell "~/.local/bin/claude-agent-toggle '#{session_name}' '#{client_name}' '#{pane_current_path}' '#{window_id}' '#{client_termname}'"
if-shell '[ -f ~/.tmux/plugins/tmux-claude-session-manager/claude_session_manager.tmux ]' \
  'run-shell ~/.tmux/plugins/tmux-claude-session-manager/claude_session_manager.tmux'
# The plugin only binds through the prefix table; move its picker off
# prefix-u onto a direct C-/. Most terminals collapse Ctrl+/ to C-_, but an app
# with focus that negotiates its own disambiguated keyboard protocol (e.g.
# Neovim requesting Kitty/CSI-u) can make the same keystroke arrive as a
# distinct C-/ instead — bind both so the picker fires either way (same
# reasoning as nvim's old dual <C-/>/<C-_> terminal-hide mapping, now on <C-t>).
unbind u
bind -n "C-_" run-shell "~/.local/bin/claude-picker '#{client_name}' '#{session_name}'"
bind -n "C-/" run-shell "~/.local/bin/claude-picker '#{client_name}' '#{session_name}'"
