# duskfox light — nightfox.nvim's dawnfox variant (rosé-dawn / rose-pine-dawn).
# Sourced by ~/.tmux.conf based on ~/.cache/theme-mode. Toggle with prefix T
# (theme-mode).
#
# bg #faf4ed, float (status) #ebe5df, fg #575279, grey (muted) #9893a5,
# blue #286983, cyan #56949f, green #618774, red #b4637a. Text on coloured
# segments uses the canvas bg #faf4ed for contrast.
set -g window-style "fg=#575279,bg=#faf4ed"
set -g status-style "bg=#ebe5df,fg=#575279"
set -g status-left "#[bg=#286983,fg=#faf4ed,bold] #S #[bg=#ebe5df] "
set -g status-right "#{?client_prefix,#[bg=#b4637a#,fg=#faf4ed#,bold] PREFIX #[default] ,}#[fg=#9893a5]%H:%M #[bg=#56949f,fg=#faf4ed,bold] #h "
setw -g window-status-format "#[fg=#9893a5] #I:#W #{?@workmux_status, #{@workmux_status},}"
setw -g window-status-current-format "#[fg=#286983,bold] #I:#W#{?window_zoomed_flag, #[fg=#618774]Z#[fg=#286983],} #{?@workmux_status, #{@workmux_status},}"
set -g pane-border-style "fg=#d0d8d8"
set -g pane-active-border-style "fg=#286983"
set -g message-style "bg=#ebe5df,fg=#575279"
set -g mode-style "bg=#286983,fg=#faf4ed"
