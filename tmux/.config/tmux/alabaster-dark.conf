# alabaster dark — p00f/alabaster.nvim port, stock palette.
# Sourced by the switcher (theme-mode use alabaster).
# bg #0e1415, status #162022 (port statusline), fg #cecece, muted #7d7d7d,
# blue #71ade7, teal #708b8d, green #95cb82, red #c33c33.
set -g window-style "fg=#cecece,bg=#0e1415"
set -g status-style "bg=#162022,fg=#cecece"
set -g status-left "#[bg=#71ade7,fg=#0e1415,bold] #S #[bg=#162022] "
set -g status-right "#{?client_prefix,#[bg=#c33c33#,fg=#0e1415#,bold] PREFIX #[default] ,}#[fg=#7d7d7d]%H:%M #[bg=#708b8d,fg=#0e1415,bold] #h "
setw -g window-status-format "#[fg=#7d7d7d] #I:#W "
setw -g window-status-current-format "#[fg=#71ade7,bold] #I:#W#{?window_zoomed_flag, #[fg=#95cb82]Z#[fg=#71ade7],} "
set -g pane-border-style "fg=#333333"
set -g pane-active-border-style "fg=#71ade7"
set -g message-style "bg=#162022,fg=#cecece"
set -g mode-style "bg=#71ade7,fg=#0e1415"
