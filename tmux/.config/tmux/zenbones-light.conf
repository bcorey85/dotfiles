# zenbones light (paper) — zenbones-theme/zenbones.nvim. Sourced by the
# switcher (theme-use zenbones light).
# bg #f0edec (paper cream), status #d6cdc9, fg #2c363c (near-black ink),
# muted #948985, blue #286486, teal #3b8992, green #4f6c31, red #a8334c.
set -g window-style "fg=#2c363c,bg=#f0edec"
set -g status-style "bg=#d6cdc9,fg=#2c363c"
set -g status-left "#[bg=#286486,fg=#f0edec,bold] #S #[bg=#d6cdc9] "
set -g status-right "#{?client_prefix,#[bg=#a8334c#,fg=#f0edec#,bold] PREFIX #[default] ,}#[fg=#948985]%H:%M #[bg=#3b8992,fg=#f0edec,bold] #h "
setw -g window-status-format "#[fg=#948985] #I:#W "
setw -g window-status-current-format "#[fg=#286486,bold] #I:#W#{?window_zoomed_flag, #[fg=#4f6c31]Z#[fg=#286486],} "
set -g pane-border-style "fg=#cfc1ba"
set -g pane-active-border-style "fg=#286486"
set -g message-style "bg=#d6cdc9,fg=#2c363c"
set -g mode-style "bg=#286486,fg=#f0edec"
