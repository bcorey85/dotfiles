# doom-one dark — NTBBloodbath/doom-one.nvim (doom emacs palette)
# Sourced by ~/.tmux.conf based on ~/.cache/theme-mode. Toggle with prefix T
# (theme-mode).
#
# bg #282c34, float (status) #21242b, fg #bbc2cf, grey (muted) #73797e,
# blue #51afef, teal #4db5bd, green #98be65, red #ff6c6b. Text on coloured
# segments uses the canvas bg #282c34 for contrast.
set -g window-style "fg=#bbc2cf,bg=#282c34"
set -g status-style "bg=#21242b,fg=#bbc2cf"
set -g status-left "#[bg=#51afef,fg=#282c34,bold] #S #[bg=#21242b] "
set -g status-right "#{?client_prefix,#[bg=#ff6c6b#,fg=#282c34#,bold] PREFIX #[default] ,}#[fg=#73797e]%H:%M #[bg=#4db5bd,fg=#282c34,bold] #h "
setw -g window-status-format "#[fg=#73797e] #I:#W #{?@workmux_status, #{@workmux_status},}"
setw -g window-status-current-format "#[fg=#51afef,bold] #I:#W#{?window_zoomed_flag, #[fg=#98be65]Z#[fg=#51afef],} #{?@workmux_status, #{@workmux_status},}"
set -g pane-border-style "fg=#3f444a"
set -g pane-active-border-style "fg=#51afef"
set -g message-style "bg=#21242b,fg=#bbc2cf"
set -g mode-style "bg=#51afef,fg=#282c34"
