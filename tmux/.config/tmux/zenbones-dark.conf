# zenbones dark — zenbones-theme/zenbones.nvim (values from the theme's own
# highlight + terminal-color output). Sourced by the switcher (theme-use zenbones).
# bg #1c1917 (warm black), status #352f2d, fg #b4bdc3, muted #928a85,
# blue #6099c0, teal #66a5ad, green #819b69, red #de6e7c.
set -g window-style "fg=#b4bdc3,bg=#1c1917"
set -g status-style "bg=#352f2d,fg=#b4bdc3"
set -g status-left "#[bg=#6099c0,fg=#1c1917,bold] #S #[bg=#352f2d] "
set -g status-right "#{?client_prefix,#[bg=#de6e7c#,fg=#1c1917#,bold] PREFIX #[default] ,}#(~/.local/bin/claude-attention badge)#[fg=#928a85]%H:%M #[bg=#66a5ad,fg=#1c1917,bold] #h "
setw -g window-status-format "#[fg=#928a85] #I:#W "
setw -g window-status-current-format "#[fg=#6099c0,bold] #I:#W#{?window_zoomed_flag, #[fg=#819b69]Z#[fg=#6099c0],} "
set -g pane-border-style "fg=#403833"
set -g pane-active-border-style "fg=#6099c0"
set -g message-style "bg=#352f2d,fg=#b4bdc3"
set -g mode-style "bg=#6099c0,fg=#1c1917"
