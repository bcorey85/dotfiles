# Kanagawa Dragon palette
palette = "kanagawa_dragon"

# NOTE: the root `format` MUST come before [palettes.*] — any key after a
# table header belongs to that table. Placed below the palette it silently
# became palettes.modus_vivendi.format and starship fell back to the default
# `$all` format (which pulls in $aws et al.).
format = """
$directory\
$git_branch\
$git_status\
$python\
$nodejs\
$cmd_duration\
$line_break\
$character"""

[palettes.kanagawa_dragon]
red = "#c4746e"
orange = "#b6927b"
yellow = "#c4b28a"
green = "#87a987"
blue = "#8ba4b0"
teal = "#949fb5"
purple = "#8992a7"
fg = "#c5c9c5"
bg = "#181616"
grey = "#727169"

[directory]
style = "bold teal"
truncation_length = 3
truncate_to_repo = true

[git_branch]
format = " [$branch]($style)"
style = "blue"

[git_status]
format = "[$all_status$ahead_behind]($style) "
style = "red"
ahead = " ↑${count}"
behind = " ↓${count}"
diverged = " ↑${ahead_count}↓${behind_count}"
modified = " ✗"
staged = " +"
untracked = " ?"
stashed = " ≡"

[python]
format = " [${virtualenv}]($style)"
style = "green"
detect_extensions = []

[nodejs]
format = " [ $version]($style)"
style = "green"

[cmd_duration]
min_time = 2_000
format = " [$duration]($style)"
style = "grey"

[character]
success_symbol = "[❯](bold teal)"
error_symbol = "[❯](bold red)"
