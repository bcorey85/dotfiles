# ef dark — ef-dream (oonamo/ef-themes.nvim port of prot's ef-themes).
# Sourced by the switcher (theme-mode use ef).
# bg #232025, status #675072 (dream's dusky-purple modeline), fg #efd5c5,
# accent #d0b0ff (violet), cyan #8fcfd0, green #7fce5f, red #ff6f6f.
set -g window-style "fg=#efd5c5,bg=#232025"
set -g status-style "bg=#675072,fg=#fedeff"
set -g status-left "#[bg=#d0b0ff,fg=#232025,bold] #S #[bg=#675072] "
set -g status-right "#{?client_prefix,#[bg=#ff6f6f#,fg=#232025#,bold] PREFIX #[default] ,}#[fg=#d9c6dc]%H:%M #[bg=#8fcfd0,fg=#232025,bold] #h "
setw -g window-status-format "#[fg=#d9c6dc] #I:#W "
setw -g window-status-current-format "#[fg=#fedeff,bold] #I:#W#{?window_zoomed_flag, #[fg=#7fce5f]Z#[fg=#fedeff],} "
set -g pane-border-style "fg=#635850"
set -g pane-active-border-style "fg=#d0b0ff"
set -g message-style "bg=#675072,fg=#fedeff"
set -g mode-style "bg=#544a50,fg=#efd5c5"
