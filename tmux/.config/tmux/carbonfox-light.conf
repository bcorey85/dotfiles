# carbonfox light — nightfox.nvim's dayfox variant (warm-linen light).
# Sourced by ~/.tmux.conf based on ~/.cache/theme-mode. Toggle with prefix T
# (theme-mode).
#
# bg #f6f2ee, float (status) #ece2d8, fg #3d2b5a, grey (muted) #7d746c,
# blue #2848a9, teal #287980, green #396847, red #a5222f. Text on coloured
# segments uses the canvas bg #f6f2ee for contrast.
set -g window-style "fg=#3d2b5a,bg=#f6f2ee"
set -g status-style "bg=#ece2d8,fg=#3d2b5a"
set -g status-left "#[bg=#2848a9,fg=#f6f2ee,bold] #S #[bg=#ece2d8] "
set -g status-right "#{?client_prefix,#[bg=#a5222f#,fg=#f6f2ee#,bold] PREFIX #[default] ,}#[fg=#7d746c]%H:%M #[bg=#287980,fg=#f6f2ee,bold] #h "
setw -g window-status-format "#[fg=#7d746c] #I:#W #{?@workmux_status, #{@workmux_status},}"
setw -g window-status-current-format "#[fg=#2848a9,bold] #I:#W#{?window_zoomed_flag, #[fg=#396847]Z#[fg=#2848a9],} #{?@workmux_status, #{@workmux_status},}"
set -g pane-border-style "fg=#e0d5c8"
set -g pane-active-border-style "fg=#2848a9"
set -g message-style "bg=#ece2d8,fg=#3d2b5a"
set -g mode-style "bg=#2848a9,fg=#f6f2ee"
