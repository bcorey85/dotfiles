# terafox dark. bg1 #152528, bg0 #0f1c1e, bg2 #1d3337, bg4 #2d4f56,
# fg1 #e6eaea, fg3 #587b7b, magenta #ad5c7c, blue #5a93aa, red #e85c51,
# cyan #a1cdd8.
set -g window-style "fg=#e6eaea,bg=#152528"
set -g status-style "bg=#0f1c1e,fg=#e6eaea"
set -g status-left "#[bg=#ad5c7c,fg=#152528,bold] #S #[bg=#0f1c1e] "
set -g status-right "#{?client_prefix,#[bg=#e85c51#,fg=#152528#,bold] PREFIX #[default] ,}#[fg=#587b7b]%H:%M #[bg=#a1cdd8,fg=#152528,bold] #h "
setw -g window-status-format "#[fg=#587b7b] #I:#W #{?@workmux_status, #{@workmux_status},}"
setw -g window-status-current-format "#[fg=#ad5c7c,bold] #I:#W#{?window_zoomed_flag, #[fg=#5a93aa]Z#[fg=#ad5c7c],} #{?@workmux_status, #{@workmux_status},}"
set -g pane-border-style "fg=#2d4f56"
set -g pane-active-border-style "fg=#ad5c7c"
set -g message-style "bg=#0f1c1e,fg=#e6eaea"
set -g mode-style "bg=#ad5c7c,fg=#152528"
