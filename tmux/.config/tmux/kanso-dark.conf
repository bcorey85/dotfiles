# kanso dark — webhooked/kanso.nvim "mist" variant.
# Sourced by the switcher (theme-use kanso).
# bg #22262d, status #2a2c35, fg #c5c9c7, muted #909398,
# blue #7fb4ca, aqua #8ea4a2, green #87a987, red #c4746e.
set -g window-style "fg=#c5c9c7,bg=#22262d"
set -g status-style "bg=#2a2c35,fg=#c5c9c7"
set -g status-left "#[bg=#7fb4ca,fg=#22262d,bold] #S #[bg=#2a2c35] "
set -g status-right "#{?client_prefix,#[bg=#c4746e#,fg=#22262d#,bold] PREFIX #[default] ,}#(~/.local/bin/claude-attention badge)#[fg=#909398]%H:%M #[bg=#8ea4a2,fg=#22262d,bold] #h "
setw -g window-status-format "#[fg=#909398] #I:#W "
setw -g window-status-current-format "#[fg=#7fb4ca,bold] #I:#W#{?window_zoomed_flag, #[fg=#87a987]Z#[fg=#7fb4ca],} "
set -g pane-border-style "fg=#393b44"
set -g pane-active-border-style "fg=#7fb4ca"
set -g message-style "bg=#2a2c35,fg=#c5c9c7"
set -g mode-style "bg=#7fb4ca,fg=#22262d"
