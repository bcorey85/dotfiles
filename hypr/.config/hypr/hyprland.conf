# Shared Hyprland config. Machine-specific monitors and env vars live in
# hyprland.local.conf (symlinked per host via install/stow).
source = ~/.config/hypr/hyprland.local.conf


################
### MONITORS ###
################

# Machine-specific monitors defined in hyprland.local.conf
# Fallback: any unknown display uses preferred resolution at auto position
monitor = ,preferred,auto,auto

xwayland {
    force_zero_scaling = true
}


###################
### MY PROGRAMS ###
###################

$terminal = ghostty
$fileManager = thunar
$menu = rofi -show drun


#################
### AUTOSTART ###
#################

# Authentication Agent
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

# Wallpaper daemon — must be split: swww-daemon runs in the foreground
exec-once = swww-daemon
exec-once = sleep 0.5 && hypr-wallpaper

# Notification daemon
exec-once = dunst

# Status bar
exec-once = waybar

# Idle daemon (auto-lock & screen off)
exec-once = hypridle

# Night light
exec-once = hyprsunset

# Battery monitor — only on machines that have a battery
exec-once = sh -c 'ls /sys/class/power_supply/BAT* >/dev/null 2>&1 && exec batsignal -b -w 20 -c 10 -d 5 -D "systemctl suspend"'

# Clipboard manager - stores clipboard history
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store


#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = QT_QPA_PLATFORMTHEME,qt5ct
env = ELECTRON_OZONE_PLATFORM_HINT,auto

# Apply GTK theme
exec-once = gsettings set org.gnome.desktop.interface gtk-theme Sonokai-Maia
exec-once = gsettings set org.gnome.desktop.interface color-scheme prefer-dark


###################
### PERMISSIONS ###
###################

# See https://wiki.hypr.land/Configuring/Permissions/
# Please note permission changes here require a Hyprland restart and are not applied on-the-fly
# for security reasons

# ecosystem {
#   enforce_permissions = 1
# }

# permission = /usr/(bin|local/bin)/grim, screencopy, allow
# permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow
# permission = /usr/(bin|local/bin)/hyprpm, plugin, allow


#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = 5
    gaps_out = 20

    border_size = 2

    col.active_border = rgba(94e2d5ee) rgba(b4befeee) 45deg
    col.inactive_border = rgba(3b4252ee)

    resize_on_border = true

    allow_tearing = false

    layout = dwindle
}

decoration {
    rounding = 10
    rounding_power = 2

    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = true
        size = 3
        passes = 1

        vibrancy = 0.1696
    }
}

animations {
    enabled = yes, please :)

    #        NAME,           X0,   Y0,   X1,   Y1
    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1

    #           NAME,          ONOFF, SPEED, CURVE,        [STYLE]
    animation = global,        1,     10,    default
    animation = border,        1,     5.39,  easeOutQuint
    animation = windows,       1,     4.79,  easeOutQuint
    animation = windowsIn,     1,     4.1,   easeOutQuint, popin 87%
    animation = windowsOut,    1,     1.49,  linear,       popin 87%
    animation = fadeIn,        1,     1.73,  almostLinear
    animation = fadeOut,       1,     1.46,  almostLinear
    animation = fade,          1,     3.03,  quick
    animation = layers,        1,     3.81,  easeOutQuint
    animation = layersIn,      1,     4,     easeOutQuint, fade
    animation = layersOut,     1,     1.5,   linear,       fade
    animation = fadeLayersIn,  1,     1.79,  almostLinear
    animation = fadeLayersOut, 1,     1.39,  almostLinear
    animation = workspaces,    1,     1.94,  almostLinear, fade
    animation = workspacesIn,  1,     1.21,  almostLinear, fade
    animation = workspacesOut, 1,     1.94,  almostLinear, fade
    animation = zoomFactor,    1,     7,     quick
}

# Remove gaps, borders, and rounding when only one tiled window
workspace = w[tv1], gapsout:0, gapsin:0, border:false, rounding:false
workspace = f[1], gapsout:0, gapsin:0, border:false, rounding:false

dwindle {
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}


#############
### INPUT ###
#############

input {
    numlock_by_default = true
    kb_layout = us,us
    kb_variant = ,colemak_dh
    kb_model =
    kb_options = ctrl:nocaps
    kb_rules =

    follow_mouse = 1

    sensitivity = 0

    touchpad {
        disable_while_typing = true
        natural_scroll = false
        clickfinger_behavior = true
        tap-to-click = true
        drag_lock = false
        tap-and-drag = false
    }
}

gesture = 3, horizontal, workspace


###################
### KEYBINDINGS ###
###################

$mainMod = SUPER

#############################
### WINDOW MANAGEMENT ###
#############################

bindd = $mainMod, Return, Open terminal, exec, $terminal
bindd = $mainMod, W, Close focused window, killactive,
bindd = $mainMod, F1, Toggle keyboard layout, exec, hyprctl switchxkblayout all next
bindd = $mainMod, F, Fullscreen, fullscreen, 0
bindd = $mainMod SHIFT, F, Fullscreen (full width), fullscreen, 1
bindd = $mainMod, T, Toggle floating, togglefloating,
bindd = $mainMod, backslash, Toggle split direction, layoutmsg, togglesplit
bindd = $mainMod, P, Pseudo tile, pseudo,

# Move focus (hjkl + arrows)
bindd = $mainMod, H, Move focus left, movefocus, l
bindd = $mainMod, L, Move focus right, movefocus, r
bindd = $mainMod, K, Move focus up, movefocus, u
bindd = $mainMod, J, Move focus down, movefocus, d
bindd = $mainMod, left, Move focus left, movefocus, l
bindd = $mainMod, right, Move focus right, movefocus, r
bindd = $mainMod, up, Move focus up, movefocus, u
bindd = $mainMod, down, Move focus down, movefocus, d

# Swap windows
bindd = $mainMod SHIFT, left, Swap window left, swapwindow, l
bindd = $mainMod SHIFT, right, Swap window right, swapwindow, r
bindd = $mainMod SHIFT, up, Swap window up, swapwindow, u
bindd = $mainMod SHIFT, down, Swap window down, swapwindow, d

# Resize windows
binded = $mainMod, equal, Grow window, layoutmsg, splitratio 0.1
binded = $mainMod, minus, Shrink window, layoutmsg, splitratio -0.1

# Scratchpad
bindd = $mainMod, S, Toggle scratchpad, togglespecialworkspace, magic
bindd = $mainMod ALT, S, Move to scratchpad, movetoworkspace, special:magic

########################
### WORKSPACE NAV ###
########################

bindd = $mainMod, 1, Switch to workspace 1, workspace, 1
bindd = $mainMod, 2, Switch to workspace 2, workspace, 2
bindd = $mainMod, 3, Switch to workspace 3, workspace, 3
bindd = $mainMod, 4, Switch to workspace 4, workspace, 4
bindd = $mainMod, 5, Switch to workspace 5, workspace, 5
bindd = $mainMod, 6, Switch to workspace 6, workspace, 6
bindd = $mainMod, 7, Switch to workspace 7, workspace, 7
bindd = $mainMod, 8, Switch to workspace 8, workspace, 8
bindd = $mainMod, 9, Switch to workspace 9, workspace, 9
bindd = $mainMod, 0, Switch to workspace 10, workspace, 10

bindd = $mainMod, Tab, Next workspace, workspace, e+1
bindd = $mainMod SHIFT, Tab, Previous workspace, workspace, e-1

# Alt-Tab window cycling
bindd = ALT, Tab, Cycle to next window, cyclenext,
bindd = ALT SHIFT, Tab, Cycle to previous window, cyclenext, prev

bindd = $mainMod SHIFT, 1, Move window to workspace 1, movetoworkspace, 1
bindd = $mainMod SHIFT, 2, Move window to workspace 2, movetoworkspace, 2
bindd = $mainMod SHIFT, 3, Move window to workspace 3, movetoworkspace, 3
bindd = $mainMod SHIFT, 4, Move window to workspace 4, movetoworkspace, 4
bindd = $mainMod SHIFT, 5, Move window to workspace 5, movetoworkspace, 5
bindd = $mainMod SHIFT, 6, Move window to workspace 6, movetoworkspace, 6
bindd = $mainMod SHIFT, 7, Move window to workspace 7, movetoworkspace, 7
bindd = $mainMod SHIFT, 8, Move window to workspace 8, movetoworkspace, 8
bindd = $mainMod SHIFT, 9, Move window to workspace 9, movetoworkspace, 9
bindd = $mainMod SHIFT, 0, Move window to workspace 10, movetoworkspace, 10

# Scroll through workspaces
bindd = $mainMod, mouse_down, Scroll workspaces forward, workspace, e+1
bindd = $mainMod, mouse_up, Scroll workspaces backward, workspace, e-1

#########################
### APP LAUNCHERS ###
#########################

bindd = $mainMod, Space, Open app launcher, exec, $menu
bindd = $mainMod SHIFT, B, Open browser, exec, google-chrome-stable
bindd = $mainMod SHIFT, N, Open Neovim, exec, $terminal -e nvim
bindd = $mainMod, E, Open file manager, exec, $fileManager
bindd = $mainMod SHIFT, D, Open Lazydocker, exec, $terminal -e lazydocker
bindd = $mainMod SHIFT, G, Open Lazygit, exec, $terminal -e lazygit
bindd = $mainMod SHIFT, A, Open Claude.ai, exec, google-chrome-stable --new-window https://claude.ai/new
bindd = $mainMod SHIFT, M, Open Plexamp, exec, plexamp
bindd = $mainMod SHIFT, comma, Edit Hyprland config, exec, $terminal -e nvim ~/.config/hypr/hyprland.conf

#########################
### SCREENSHOTS ###
#########################

bindd = $mainMod SHIFT, S, Screenshot region, exec, bash ~/.local/bin/hypr-screenshot region
bindd = , Print, Screenshot fullscreen, exec, bash ~/.local/bin/hypr-screenshot
bindd = $mainMod, Print, Screenshot region, exec, bash ~/.local/bin/hypr-screenshot region

######################
### SYSTEM ###
######################

bindd = $mainMod, Escape, Power menu, exec, bash ~/.local/bin/hypr-power-menu
bindd = $mainMod CTRL, L, Lock screen, exec, hyprlock
bindd = $mainMod CTRL, A, Audio controls, exec, pavucontrol
bindd = $mainMod CTRL, K, Toggle keyboard layout, exec, hyprctl switchxkblayout all next
bindd = $mainMod CTRL, Space, Cycle wallpaper, exec, bash ~/.local/bin/hypr-wallpaper
bindd = $mainMod CTRL, V, Clipboard history, exec, cliphist list | rofi -dmenu -p "Clipboard" | cliphist decode | wl-copy
bindd = $mainMod, slash, Show keybindings, exec, bash ~/.local/bin/hypr-which-key
bindd = $mainMod SHIFT, C, Pick color to clipboard, exec, hyprpicker -a

# Mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Media keys
bindeld = ,XF86AudioRaiseVolume, Raise volume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindeld = ,XF86AudioLowerVolume, Lower volume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindeld = ,XF86AudioMute, Mute audio, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindeld = ,XF86AudioMicMute, Mute microphone, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindeld = ,XF86MonBrightnessUp, Increase brightness, exec, brightnessctl -e4 -n2 set 5%+
bindeld = ,XF86MonBrightnessDown, Decrease brightness, exec, brightnessctl -e4 -n2 set 5%-
bindld = , XF86AudioNext, Next track, exec, playerctl next
bindld = , XF86AudioPause, Pause/play, exec, playerctl play-pause
bindld = , XF86AudioPlay, Play/pause, exec, playerctl play-pause
bindld = , XF86AudioPrev, Previous track, exec, playerctl previous

##############################
### WINDOWS AND WORKSPACES ###
##############################

windowrule {
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

windowrule {
    name = float-dialogs
    match:title = ^(Open|Open File|Save|Save As|Save File|Rename|Delete|Confirm|Replace|Properties|Preferences|Settings|About)(.*)$
    float = true
    center = true
}

windowrule {
    name = float-dialog-classes
    match:class = ^(file_progress|confirm|dialog|notification|splash|pinentry|pavucontrol|org.gnome.Calculator|xdg-desktop-portal-gtk|polkit-gnome-authentication-agent-1)$
    float = true
    center = true
}

windowrule {
    name = float-polkit
    match:class = ^(org.freedesktop.impl.portal.desktop.gtk|org.freedesktop.impl.portal.desktop.hyprland)$
    float = true
    center = true
}

windowrule {
    name = wow-fullscreen
    match:class = steam_app_default
    fullscreen = fullscreen
    suppress_event = fullscreen activate activatefocus
}

windowrule {
    name = move-hyprland-run

    match:class = hyprland-run

    move = 20 monitor_h-120
    float = yes
}
