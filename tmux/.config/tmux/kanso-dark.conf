# kanso-mist — webhooked/kanso.nvim (values from Ghostty's built-in
# "Kanso Mist" theme so terminal and tmux chrome match exactly).
# Sourced by ~/.tmux.conf based on ~/.cache/theme-mode. Toggle with prefix t.
#
# bg #22262d, float (status) #14171d (kanso-ink bg, one step darker), fg
# #c5c9c7, grey (muted) #a4a7a4, blue #8ba4b0, aqua #8ea4a2, green #8a9a7b,
# red #c4746e. Text on coloured segments uses the canvas bg #22262d.
set -g window-style "fg=#c5c9c7,bg=#22262d"
set -g status-style "bg=#14171d,fg=#c5c9c7"
set -g status-left "#[bg=#8ba4b0,fg=#22262d,bold] #S #[bg=#14171d] "
set -g status-right "#{?client_prefix,#[bg=#c4746e#,fg=#22262d#,bold] PREFIX #[default] ,}#[fg=#a4a7a4]%H:%M #[bg=#8ea4a2,fg=#22262d,bold] #h "
setw -g window-status-format "#[fg=#a4a7a4] #I:#W "
setw -g window-status-current-format "#[fg=#8ba4b0,bold] #I:#W#{?window_zoomed_flag, #[fg=#8a9a7b]Z#[fg=#8ba4b0],} "
set -g pane-border-style "fg=#43464e"
set -g pane-active-border-style "fg=#8ba4b0"
set -g message-style "bg=#14171d,fg=#c5c9c7"
set -g mode-style "bg=#8ba4b0,fg=#22262d"
