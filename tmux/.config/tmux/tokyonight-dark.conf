# tokyonight dark — folke/tokyonight.nvim "storm" variant.
# Sourced by the switcher (theme-mode use tokyonight).
# bg #24283b, status #1f2335, fg #c0caf5, muted #565f89,
# blue #7aa2f7, cyan #7dcfff, green #9ece6a, red #f7768e.
set -g window-style "fg=#c0caf5,bg=#24283b"
set -g status-style "bg=#1f2335,fg=#c0caf5"
set -g status-left "#[bg=#7aa2f7,fg=#24283b,bold] #S #[bg=#1f2335] "
set -g status-right "#{?client_prefix,#[bg=#f7768e#,fg=#24283b#,bold] PREFIX #[default] ,}#[fg=#565f89]%H:%M #[bg=#7dcfff,fg=#24283b,bold] #h "
setw -g window-status-format "#[fg=#565f89] #I:#W "
setw -g window-status-current-format "#[fg=#7aa2f7,bold] #I:#W#{?window_zoomed_flag, #[fg=#9ece6a]Z#[fg=#7aa2f7],} "
set -g pane-border-style "fg=#3b4261"
set -g pane-active-border-style "fg=#7aa2f7"
set -g message-style "bg=#1f2335,fg=#c0caf5"
set -g mode-style "bg=#2e3c64,fg=#c0caf5"
