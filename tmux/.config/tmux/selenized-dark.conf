# selenized dark — jan-warchol's Selenized, served by maxmx03/solarized.nvim
# (palette = "selenized"). Raw palette, no contrast tuning.
# Sourced by the switcher (theme-mode use selenized).
# bg #103c48, status #184956, fg #adbcbc, muted #72898f,
# blue #4695f7, cyan #41c7b9, green #75b938, red #fa5750.
set -g window-style "fg=#adbcbc,bg=#103c48"
set -g status-style "bg=#184956,fg=#adbcbc"
set -g status-left "#[bg=#4695f7,fg=#103c48,bold] #S #[bg=#184956] "
set -g status-right "#{?client_prefix,#[bg=#fa5750#,fg=#103c48#,bold] PREFIX #[default] ,}#[fg=#72898f]%H:%M #[bg=#41c7b9,fg=#103c48,bold] #h "
setw -g window-status-format "#[fg=#72898f] #I:#W #{?@workmux_status, #{@workmux_status},}"
setw -g window-status-current-format "#[fg=#4695f7,bold] #I:#W#{?window_zoomed_flag, #[fg=#75b938]Z#[fg=#4695f7],} #{?@workmux_status, #{@workmux_status},}"
set -g pane-border-style "fg=#184956"
set -g pane-active-border-style "fg=#4695f7"
set -g message-style "bg=#184956,fg=#adbcbc"
set -g mode-style "bg=#2d5b69,fg=#adbcbc"
