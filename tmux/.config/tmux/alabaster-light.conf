# alabaster light — p00f/alabaster.nvim port, stock palette (tonsky's design).
# Sourced by the switcher (theme-mode use alabaster light).
# bg #f7f7f7, status #c9c9c9 (port statusline), fg #000000, muted #777777,
# blue #325cc0, cyan #0083b2, green #448c27, red #aa3731.
set -g window-style "fg=#000000,bg=#f7f7f7"
set -g status-style "bg=#c9c9c9,fg=#000000"
set -g status-left "#[bg=#325cc0,fg=#f7f7f7,bold] #S #[bg=#c9c9c9] "
set -g status-right "#{?client_prefix,#[bg=#aa3731#,fg=#f7f7f7#,bold] PREFIX #[default] ,}#[fg=#777777]%H:%M #[bg=#0083b2,fg=#f7f7f7,bold] #h "
setw -g window-status-format "#[fg=#777777] #I:#W "
setw -g window-status-current-format "#[fg=#325cc0,bold] #I:#W#{?window_zoomed_flag, #[fg=#448c27]Z#[fg=#325cc0],} "
set -g pane-border-style "fg=#c9c9c9"
set -g pane-active-border-style "fg=#325cc0"
set -g message-style "bg=#c9c9c9,fg=#000000"
set -g mode-style "bg=#325cc0,fg=#f7f7f7"
