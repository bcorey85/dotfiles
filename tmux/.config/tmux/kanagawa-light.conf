# kanagawa light — rebelot/kanagawa.nvim "lotus" variant (yellow paper).
# Sourced by the switcher (theme-mode use kanagawa light).
# bg #f2ecbc, status #e4d794, fg #434350, muted #63625b,
# blue #4d699b, teal #5e857a, green #6f894e, red #c84053.
set -g window-style "fg=#434350,bg=#f2ecbc"
set -g status-style "bg=#e4d794,fg=#434350"
set -g status-left "#[bg=#4d699b,fg=#f2ecbc,bold] #S #[bg=#e4d794] "
set -g status-right "#{?client_prefix,#[bg=#c84053#,fg=#f2ecbc#,bold] PREFIX #[default] ,}#[fg=#63625b]%H:%M #[bg=#5e857a,fg=#f2ecbc,bold] #h "
setw -g window-status-format "#[fg=#63625b] #I:#W "
setw -g window-status-current-format "#[fg=#4d699b,bold] #I:#W#{?window_zoomed_flag, #[fg=#6f894e]Z#[fg=#4d699b],} "
set -g pane-border-style "fg=#d5cea3"
set -g pane-active-border-style "fg=#4d699b"
set -g message-style "bg=#e4d794,fg=#434350"
set -g mode-style "bg=#4d699b,fg=#f2ecbc"
