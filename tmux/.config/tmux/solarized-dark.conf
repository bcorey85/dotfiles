# solarized dark — Schoonover's canonical palette (maxmx03/solarized.nvim).
# Sourced by the switcher (theme-mode use solarized).
# bg base03 #002b36, status base02 #073642, fg base1 #93a1a1, muted base0 #839496,
# blue #268bd2, cyan #2aa198, green #859900, red #dc322f.
set -g window-style "fg=#93a1a1,bg=#002b36"
set -g status-style "bg=#073642,fg=#93a1a1"
set -g status-left "#[bg=#268bd2,fg=#002b36,bold] #S #[bg=#073642] "
set -g status-right "#{?client_prefix,#[bg=#dc322f#,fg=#002b36#,bold] PREFIX #[default] ,}#[fg=#839496]%H:%M #[bg=#2aa198,fg=#002b36,bold] #h "
setw -g window-status-format "#[fg=#839496] #I:#W #{?@workmux_status, #{@workmux_status},}"
setw -g window-status-current-format "#[fg=#268bd2,bold] #I:#W#{?window_zoomed_flag, #[fg=#859900]Z#[fg=#268bd2],} #{?@workmux_status, #{@workmux_status},}"
set -g pane-border-style "fg=#073642"
set -g pane-active-border-style "fg=#268bd2"
set -g message-style "bg=#073642,fg=#93a1a1"
set -g mode-style "bg=#268bd2,fg=#002b36"
