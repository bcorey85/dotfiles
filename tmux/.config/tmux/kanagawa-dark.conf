# kanagawa dark — rebelot/kanagawa.nvim "dragon" variant.
# Sourced by the switcher (theme-mode use kanagawa).
# bg #181616, status #282727, fg #c5c9c5, muted #848c84,
# blue #7fb4ca, aqua #8ea4a2, green #87a987, red #c4746e.
set -g window-style "fg=#c5c9c5,bg=#181616"
set -g status-style "bg=#282727,fg=#c5c9c5"
set -g status-left "#[bg=#7fb4ca,fg=#181616,bold] #S #[bg=#282727] "
set -g status-right "#{?client_prefix,#[bg=#c4746e#,fg=#181616#,bold] PREFIX #[default] ,}#(~/.local/bin/claude-attention badge)#[fg=#848c84]%H:%M #[bg=#8ea4a2,fg=#181616,bold] #h "
setw -g window-status-format "#[fg=#848c84] #I:#W "
setw -g window-status-current-format "#[fg=#7fb4ca,bold] #I:#W#{?window_zoomed_flag, #[fg=#87a987]Z#[fg=#7fb4ca],} "
set -g pane-border-style "fg=#393836"
set -g pane-active-border-style "fg=#7fb4ca"
set -g message-style "bg=#282727,fg=#c5c9c5"
set -g mode-style "bg=#7fb4ca,fg=#181616"
