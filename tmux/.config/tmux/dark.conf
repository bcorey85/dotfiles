# nightfox (dark) — EdenEast/nightfox.nvim
# Sourced by ~/.tmux.conf based on ~/.cache/theme-mode. Toggle with prefix t.
#
# bg #192330, float (status/float) #212e3f, fg #cdcecf, grey (muted) #71839b,
# blue #719cd6, cyan #63cdcf, green #81b29a, red #c94f6d.
set -g window-style "fg=#cdcecf,bg=#192330"
set -g status-style "bg=#212e3f,fg=#cdcecf"
set -g status-left "#[bg=#719cd6,fg=#131a24,bold] #S #[bg=#212e3f] "
set -g status-right "#{?client_prefix,#[bg=#c94f6d#,fg=#131a24#,bold] PREFIX #[default] ,}#[fg=#71839b]%H:%M #[bg=#63cdcf,fg=#131a24,bold] #h "
setw -g window-status-format "#[fg=#71839b] #I:#W "
setw -g window-status-current-format "#[fg=#719cd6,bold] #I:#W#{?window_zoomed_flag, #[fg=#81b29a]Z#[fg=#719cd6],} "
set -g pane-border-style "fg=#212e3f"
set -g pane-active-border-style "fg=#719cd6"
set -g message-style "bg=#212e3f,fg=#cdcecf"
set -g mode-style "bg=#719cd6,fg=#131a24"
