# one light — onelight (olimorris/onedarkpro.nvim), Atom's One Light.
# bg #eaeaea (toned down from stock #fafafa; matches nvim/ghostty one-light),
# status #dedede (a shade below the window), fg #6a6a6a (ink #383a42),
# accent #118dc3 (blue), green #1da912, red #e05661, purple #9a77cf.
set -g window-style "fg=#6a6a6a,bg=#eaeaea"
set -g status-style "bg=#dedede,fg=#383a42"
set -g status-left "#[bg=#118dc3,fg=#fafafa,bold] #S #[bg=#dedede] "
set -g status-right "#{?client_prefix,#[bg=#e05661#,fg=#fafafa#,bold] PREFIX #[default] ,}#[fg=#a0a1a7]%H:%M #[bg=#1da912,fg=#fafafa,bold] #h "
setw -g window-status-format "#[fg=#a0a1a7] #I:#W #{?@workmux_status, #{@workmux_status},}"
setw -g window-status-current-format "#[fg=#118dc3,bold] #I:#W#{?window_zoomed_flag, #[fg=#1da912]Z#[fg=#118dc3],} #{?@workmux_status, #{@workmux_status},}"
set -g pane-border-style "fg=#d4d4d4"
set -g pane-active-border-style "fg=#118dc3"
set -g message-style "bg=#dedede,fg=#383a42"
set -g mode-style "bg=#dcdcdc,fg=#6a6a6a"
