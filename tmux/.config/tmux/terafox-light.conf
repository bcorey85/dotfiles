# terafox light (dawnfox variant). bg1 #faf4ed, bg0 #ebe5df, bg4 #bdbfc9,
# fg1 #575279, magenta #907aa9, blue #286983, red #b4637a, cyan #56949f.
# Muted text uses fg2 #625c87 (5.66:1), not dawnfox's fg3 #a8a3b3 — that sits
# at 2.25:1 on this pale bg and is unreadable as status text.
set -g window-style "fg=#575279,bg=#faf4ed"
set -g status-style "bg=#ebe5df,fg=#575279"
set -g status-left "#[bg=#907aa9,fg=#faf4ed,bold] #S #[bg=#ebe5df] "
set -g status-right "#{?client_prefix,#[bg=#b4637a#,fg=#faf4ed#,bold] PREFIX #[default] ,}#[fg=#625c87]%H:%M #[bg=#56949f,fg=#faf4ed,bold] #h "
setw -g window-status-format "#[fg=#625c87] #I:#W #{?@workmux_status, #{@workmux_status},}"
setw -g window-status-current-format "#[fg=#907aa9,bold] #I:#W#{?window_zoomed_flag, #[fg=#286983]Z#[fg=#907aa9],} #{?@workmux_status, #{@workmux_status},}"
set -g pane-border-style "fg=#bdbfc9"
set -g pane-active-border-style "fg=#907aa9"
set -g message-style "bg=#ebe5df,fg=#575279"
set -g mode-style "bg=#907aa9,fg=#faf4ed"
