# duskbox light — duskbox "dawn" variant (ih-hugh/duskbox).
# Sourced by ~/.tmux.conf based on ~/.cache/theme-mode. Toggle with prefix T
# (theme-mode).
#
# bg #faf2e8, float (status) #f2eae0, fg #2a3345, grey (muted) #6a758a,
# blue #33659d, cyan #097687, green #3e7232, red #be2327. Text on coloured
# segments uses the canvas bg #faf2e8 for contrast.
set -g window-style "fg=#2a3345,bg=#faf2e8"
set -g status-style "bg=#f2eae0,fg=#2a3345"
set -g status-left "#[bg=#33659d,fg=#faf2e8,bold] #S #[bg=#f2eae0] "
set -g status-right "#{?client_prefix,#[bg=#be2327#,fg=#faf2e8#,bold] PREFIX #[default] ,}#[fg=#6a758a]%H:%M #[bg=#097687,fg=#faf2e8,bold] #h "
setw -g window-status-format "#[fg=#6a758a] #I:#W #{?@workmux_status, #{@workmux_status},}"
setw -g window-status-current-format "#[fg=#33659d,bold] #I:#W#{?window_zoomed_flag, #[fg=#3e7232]Z#[fg=#33659d],} #{?@workmux_status, #{@workmux_status},}"
set -g pane-border-style "fg=#cfdae9"
set -g pane-active-border-style "fg=#33659d"
set -g message-style "bg=#f2eae0,fg=#2a3345"
set -g mode-style "bg=#33659d,fg=#faf2e8"
