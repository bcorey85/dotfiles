# zenwritten light — zenbones-theme/zenbones.nvim (grayscale sibling).
# Sourced by the switcher (theme-use zenwritten light).
# bg #eeeeee, status #cfcfcf, fg #353535, muted #696969,
# blue #286486, teal #3b8992, green #4f6c31, red #a8334c.
set -g window-style "fg=#353535,bg=#eeeeee"
set -g status-style "bg=#cfcfcf,fg=#353535"
set -g status-left "#[bg=#286486,fg=#eeeeee,bold] #S #[bg=#cfcfcf] "
set -g status-right "#{?client_prefix,#[bg=#a8334c#,fg=#eeeeee#,bold] PREFIX #[default] ,}#(~/.local/bin/claude-attention badge)#[fg=#696969]%H:%M #[bg=#3b8992,fg=#eeeeee,bold] #h "
setw -g window-status-format "#[fg=#696969] #I:#W "
setw -g window-status-current-format "#[fg=#286486,bold] #I:#W#{?window_zoomed_flag, #[fg=#4f6c31]Z#[fg=#286486],} "
set -g pane-border-style "fg=#c6c3c3"
set -g pane-active-border-style "fg=#286486"
set -g message-style "bg=#cfcfcf,fg=#353535"
set -g mode-style "bg=#286486,fg=#eeeeee"
