# gruvbox-material dark (medium) — sainnhe/gruvbox-material
# Sourced by the theme-mode switcher (theme-use gruvbox-material).
# bg #282828, status (bg_dim) #1f1f1f, fg #d4be98, muted (grey1) #928374,
# blue #7daea3, aqua #89b482, green #a9b665, red #ea6962. Text on coloured
# segments uses the canvas bg #282828 for contrast.
set -g window-style "fg=#d4be98,bg=#282828"
set -g status-style "bg=#1f1f1f,fg=#d4be98"
set -g status-left "#[bg=#7daea3,fg=#282828,bold] #S #[bg=#1f1f1f] "
set -g status-right "#{?client_prefix,#[bg=#ea6962#,fg=#282828#,bold] PREFIX #[default] ,}#(~/.local/bin/claude-attention badge)#[fg=#928374]%H:%M #[bg=#89b482,fg=#282828,bold] #h "
setw -g window-status-format "#[fg=#928374] #I:#W "
setw -g window-status-current-format "#[fg=#7daea3,bold] #I:#W#{?window_zoomed_flag, #[fg=#a9b665]Z#[fg=#7daea3],} "
set -g pane-border-style "fg=#504945"
set -g pane-active-border-style "fg=#7daea3"
set -g message-style "bg=#1f1f1f,fg=#d4be98"
set -g mode-style "bg=#7daea3,fg=#282828"
