# github_light — projekt0n/github-nvim-theme
# Sourced by ~/.tmux.conf based on ~/.cache/theme-mode. Toggle with prefix T
# (theme-mode).
#
# bg #ffffff, float (status) #f6f8fa, fg #1f2328, grey (muted) #6e7781,
# blue #0969da, cyan #1b7c83, green #116329, red #cf222e. Text on coloured
# segments uses white #ffffff for contrast.
set -g window-style "fg=#1f2328,bg=#ffffff"
set -g status-style "bg=#f6f8fa,fg=#1f2328"
set -g status-left "#[bg=#0969da,fg=#ffffff,bold] #S #[bg=#f6f8fa] "
set -g status-right "#{?client_prefix,#[bg=#cf222e#,fg=#ffffff#,bold] PREFIX #[default] ,}#[fg=#6e7781]%H:%M #[bg=#1b7c83,fg=#ffffff,bold] #h "
setw -g window-status-format "#[fg=#6e7781] #I:#W "
setw -g window-status-current-format "#[fg=#0969da,bold] #I:#W#{?window_zoomed_flag, #[fg=#116329]Z#[fg=#0969da],} "
set -g pane-border-style "fg=#d0d7de"
set -g pane-active-border-style "fg=#0969da"
set -g message-style "bg=#f6f8fa,fg=#1f2328"
set -g mode-style "bg=#0969da,fg=#ffffff"
