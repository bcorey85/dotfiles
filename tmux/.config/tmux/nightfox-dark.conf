# nightfox dark. bg1 #192330, bg0 #131a24, bg2 #212e3f, bg4 #39506d,
# fg1 #cdcecf, fg3 #71839b, magenta #9d79d6, blue #719cd6, red #c94f6d,
# cyan #63cdcf.
set -g window-style "fg=#cdcecf,bg=#192330"
set -g status-style "bg=#131a24,fg=#cdcecf"
set -g status-left "#[bg=#9d79d6,fg=#192330,bold] #S #[bg=#131a24] "
set -g status-right "#{?client_prefix,#[bg=#c94f6d#,fg=#192330#,bold] PREFIX #[default] ,}#[fg=#71839b]%H:%M #[bg=#63cdcf,fg=#192330,bold] #h "
setw -g window-status-format "#[fg=#71839b] #I:#W #{?@workmux_status, #{@workmux_status},}"
setw -g window-status-current-format "#[fg=#9d79d6,bold] #I:#W#{?window_zoomed_flag, #[fg=#719cd6]Z#[fg=#9d79d6],} #{?@workmux_status, #{@workmux_status},}"
set -g pane-border-style "fg=#39506d"
set -g pane-active-border-style "fg=#9d79d6"
set -g message-style "bg=#131a24,fg=#cdcecf"
set -g mode-style "bg=#9d79d6,fg=#192330"
