# modus-vivendi (default) — miikanissi/modus-themes.nvim dark palette.
# Sourced by ~/.tmux.conf based on ~/.cache/theme-mode. Toggle with prefix t.
#
# bg #161616 (oxocarbon), dim #262626, fg #f2f4f8 (oxocarbon), muted #6e768a, alt #393939,
# blue #2fafff (primary), cyan #00d3d0, green #44bc44, red #ff5f59.
set -g window-style "fg=#f2f4f8,bg=#161616"
set -g status-style "bg=#262626,fg=#f2f4f8"
set -g status-left "#[bg=#2fafff,fg=#161616,bold] #S #[bg=#262626] "
set -g status-right "#{?client_prefix,#[bg=#ff5f59#,fg=#161616#,bold] PREFIX #[default] ,}#[fg=#6e768a]%H:%M #[bg=#00d3d0,fg=#161616,bold] #h "
setw -g window-status-format "#[fg=#6e768a] #I:#W "
setw -g window-status-current-format "#[fg=#2fafff,bold] #I:#W#{?window_zoomed_flag, #[fg=#44bc44]Z#[fg=#2fafff],} "
set -g pane-border-style "fg=#262626"
set -g pane-active-border-style "fg=#2fafff"
set -g message-style "bg=#262626,fg=#f2f4f8"
set -g mode-style "bg=#2fafff,fg=#161616"
