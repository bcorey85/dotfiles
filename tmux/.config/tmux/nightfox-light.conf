# nightfox light (dayfox variant). bg1 #f6f2ee, bg0 #e4dcd4, bg3 #d3c7bb,
# bg4 #aab0ad, fg1 #3d2b5a, fg3 #824d5b, magenta #6e33ce, blue #2848a9,
# red #a5222f, cyan #287980.
set -g window-style "fg=#3d2b5a,bg=#f6f2ee"
set -g status-style "bg=#e4dcd4,fg=#3d2b5a"
set -g status-left "#[bg=#6e33ce,fg=#f6f2ee,bold] #S #[bg=#e4dcd4] "
set -g status-right "#{?client_prefix,#[bg=#a5222f#,fg=#f6f2ee#,bold] PREFIX #[default] ,}#[fg=#824d5b]%H:%M #[bg=#287980,fg=#f6f2ee,bold] #h "
setw -g window-status-format "#[fg=#824d5b] #I:#W #{?@workmux_status, #{@workmux_status},}"
setw -g window-status-current-format "#[fg=#6e33ce,bold] #I:#W#{?window_zoomed_flag, #[fg=#2848a9]Z#[fg=#6e33ce],} #{?@workmux_status, #{@workmux_status},}"
set -g pane-border-style "fg=#aab0ad"
set -g pane-active-border-style "fg=#6e33ce"
set -g message-style "bg=#e4dcd4,fg=#3d2b5a"
set -g mode-style "bg=#6e33ce,fg=#f6f2ee"
