# duskbox dark — duskbox "dusk" variant (ih-hugh/duskbox).
# Sourced by ~/.tmux.conf based on ~/.cache/theme-mode. Toggle with prefix T
# (theme-mode).
#
# bg #232336, float (status) #1d1d30, fg #ccd8ef, grey (muted) #828ca2,
# blue #79b3f7, cyan #44d6f1, green #89cc7b, red #f4514c. Text on coloured
# segments uses the canvas bg #232336 for contrast.
set -g window-style "fg=#ccd8ef,bg=#232336"
set -g status-style "bg=#1d1d30,fg=#ccd8ef"
set -g status-left "#[bg=#79b3f7,fg=#232336,bold] #S #[bg=#1d1d30] "
set -g status-right "#{?client_prefix,#[bg=#f4514c#,fg=#232336#,bold] PREFIX #[default] ,}#[fg=#828ca2]%H:%M #[bg=#44d6f1,fg=#232336,bold] #h "
setw -g window-status-format "#[fg=#828ca2] #I:#W #{?@workmux_status, #{@workmux_status},}"
setw -g window-status-current-format "#[fg=#79b3f7,bold] #I:#W#{?window_zoomed_flag, #[fg=#89cc7b]Z#[fg=#79b3f7],} #{?@workmux_status, #{@workmux_status},}"
set -g pane-border-style "fg=#253a55"
set -g pane-active-border-style "fg=#79b3f7"
set -g message-style "bg=#1d1d30,fg=#ccd8ef"
set -g mode-style "bg=#79b3f7,fg=#232336"
