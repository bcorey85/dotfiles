# token light — ThorstenRhau/token light variant.
# bg #faf9f5, status #ecebe7, fg #2a2920, muted #6c675f,
# accent #9a4929, cyan #2d6c6c, green #3f643c, red #b05555.
set -g window-style "fg=#2a2920,bg=#faf9f5"
set -g status-style "bg=#ecebe7,fg=#2a2920"
set -g status-left "#[bg=#9a4929,fg=#faf9f5,bold] #S #[bg=#ecebe7] "
set -g status-right "#{?client_prefix,#[bg=#b05555#,fg=#faf9f5#,bold] PREFIX #[default] ,}#[fg=#6c675f]%H:%M #[bg=#2d6c6c,fg=#faf9f5,bold] #h "
setw -g window-status-format "#[fg=#6c675f] #I:#W #{?@workmux_status, #{@workmux_status},}"
setw -g window-status-current-format "#[fg=#9a4929,bold] #I:#W#{?window_zoomed_flag, #[fg=#3f643c]Z#[fg=#9a4929],} #{?@workmux_status, #{@workmux_status},}"
set -g pane-border-style "fg=#a8a49c"
set -g pane-active-border-style "fg=#9a4929"
set -g message-style "bg=#ecebe7,fg=#2a2920"
set -g mode-style "bg=#dddcd6,fg=#2a2920"
