# modus-operandi — miikanissi/modus-themes.nvim light palette.
# Sourced by ~/.tmux.conf based on ~/.cache/theme-mode. Toggle with prefix t.
#
# bg #ffffff, dim #e0e0e0, fg #000000, muted #595959, alt #c8c8c8,
# blue #3548cf (primary), cyan #005e8b, green #006800, red #a60000.
set -g window-style "fg=#000000,bg=#ffffff"
set -g status-style "bg=#e0e0e0,fg=#000000"
set -g status-left "#[bg=#3548cf,fg=#ffffff,bold] #S #[bg=#e0e0e0] "
set -g status-right "#{?client_prefix,#[bg=#a60000#,fg=#ffffff#,bold] PREFIX #[default] ,}#[fg=#595959]%H:%M #[bg=#005e8b,fg=#ffffff,bold] #h "
setw -g window-status-format "#[fg=#595959] #I:#W "
setw -g window-status-current-format "#[fg=#3548cf,bold] #I:#W#{?window_zoomed_flag, #[fg=#006800]Z#[fg=#3548cf],} "
set -g pane-border-style "fg=#e0e0e0"
set -g pane-active-border-style "fg=#3548cf"
set -g message-style "bg=#e0e0e0,fg=#000000"
set -g mode-style "bg=#3548cf,fg=#ffffff"
