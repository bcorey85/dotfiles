# tokyobones light (day) — zenbones-theme/zenbones.nvim (tokyonight-flavored
# bones), values from the theme's day palette. Sourced by the switcher
# (theme-mode use tokyobones light).
# bg #d5d6db, status #c4c8da, fg #343b58 (deep blue ink), muted #585c70,
# blue #34548a, sky #166775, wood #8f5e15, red #8c4351, blossom #5a4a78.
set -g window-style "fg=#343b58,bg=#d5d6db"
set -g status-style "bg=#c4c8da,fg=#343b58"
set -g status-left "#[bg=#34548a,fg=#d5d6db,bold] #S #[bg=#c4c8da] "
set -g status-right "#{?client_prefix,#[bg=#8c4351#,fg=#d5d6db#,bold] PREFIX #[default] ,}#[fg=#585c70]%H:%M #[bg=#166775,fg=#d5d6db,bold] #h "
setw -g window-status-format "#[fg=#585c70] #I:#W #{?@workmux_status, #{@workmux_status},}"
setw -g window-status-current-format "#[fg=#34548a,bold] #I:#W#{?window_zoomed_flag, #[fg=#8f5e15]Z#[fg=#34548a],} #{?@workmux_status, #{@workmux_status},}"
set -g pane-border-style "fg=#b6b9c9"
set -g pane-active-border-style "fg=#34548a"
set -g message-style "bg=#c4c8da,fg=#343b58"
set -g mode-style "bg=#34548a,fg=#d5d6db"
